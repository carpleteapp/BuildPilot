<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <title>Repair Order - BuildPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/buildpilot-core.css" />
  <link rel="stylesheet" href="css/buildpilot-ux.css" />
  <link rel="stylesheet" href="css/buildpilot-premium-overrides.css" />
  <style>
    .sv-shell { max-width: 28rem; margin: 0 auto; min-height: 100vh; padding-bottom: 5rem; }
    .sv-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--bp-border, #2a2a36);
      position: sticky; top: 0; z-index: 10; background: var(--bp-bg, #0d0d11);
    }
    .sv-back {
      width: 44px; height: 44px; border: none; border-radius: 10px;
      background: transparent; color: var(--bp-text, #f5f5f7); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .sv-title { margin: 0; font-size: 1.125rem; font-weight: 800; }
    .sv-eyebrow { margin: 0; font-size: 0.7rem; color: var(--bp-text-muted, #8e8e93); text-transform: uppercase; letter-spacing: 0.08em; }
    .sv-main { padding: 1rem; }
    .sv-card {
      background: var(--bp-surface, #16161c); border: 1px solid var(--bp-border, #2a2a36);
      border-radius: 12px; padding: 1rem; margin-bottom: 1rem;
    }
    .sv-card h2 { margin: 0 0 0.75rem; font-size: 0.85rem; font-weight: 700; color: var(--bp-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .sv-row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.35rem 0; font-size: 0.9rem; }
    .sv-row span:first-child { color: var(--bp-text-muted); }
    .sv-row strong { font-weight: 700; }
    .sv-actions { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .sv-btn {
      display: block; text-align: center; padding: 0.75rem 1rem; border-radius: 10px;
      font-weight: 700; font-size: 0.9rem; text-decoration: none; border: none; cursor: pointer;
    }
    .sv-btn--primary { background: var(--bp-cobalt, #3b9eff); color: #fff; }
    .sv-btn--secondary { background: transparent; color: var(--bp-text); border: 1px solid var(--bp-border); }
    .sv-status { display: inline-block; margin-top: 0.25rem; }
    .sv-empty { text-align: center; padding: 3rem 1rem; color: var(--bp-text-muted); }
  </style>
</head>
<body>
  <div class="sv-shell" id="sv-app">
    <header class="sv-header" id="sv-header" hidden>
      <button type="button" class="sv-back" id="sv-back" aria-label="Back to dashboard">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <div>
        <p class="sv-eyebrow">Customer repair</p>
        <h1 class="sv-title" id="sv-vehicle-title">Repair order</h1>
      </div>
    </header>
    <main class="sv-main" id="sv-main"></main>
  </div>

  <script src="js/buildpilot-storage.js"></script>
  <script src="js/buildpilot-shop.js"></script>
  <script>
    (function () {
      if (window.BuildPilotStorage && window.BuildPilotStorage.ensureBetaCleanStorageForTrial) {
        window.BuildPilotStorage.ensureBetaCleanStorageForTrial();
      }
      const S = window.BuildPilotShop;
      if (!S) {
        document.getElementById("sv-main").innerHTML = "<p class=\"sv-empty\">Shop module failed to load.</p>";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const vehicleId = params.get("id");
      const headerEl = document.getElementById("sv-header");
      const mainEl = document.getElementById("sv-main");
      const titleEl = document.getElementById("sv-vehicle-title");
      const backBtn = document.getElementById("sv-back");

      backBtn.addEventListener("click", () => { window.location.href = "index.html"; });

      if (!vehicleId) {
        mainEl.innerHTML = "<p class=\"sv-empty\">No repair order selected.</p>";
        return;
      }

      const vehicle = S.getShopVehicle(vehicleId);
      if (!vehicle || !S.isCustomerVehicle(vehicle)) {
        mainEl.innerHTML = "<p class=\"sv-empty\">Repair order not found. <a href=\"index.html\">Return to dashboard</a>.</p>";
        return;
      }

      const customer = S.getCustomer(vehicle.customerId);
      const ro = S.normalizeRepairOrder(vehicle.repairOrder);
      const displayTitle = S.vehicleDisplayTitle(vehicle);

      headerEl.hidden = false;
      titleEl.textContent = displayTitle;

      function row(label, value) {
        const div = document.createElement("div");
        div.className = "sv-row";
        div.innerHTML = "<span>" + label + "</span><strong>" + value + "</strong>";
        return div;
      }

      const overview = document.createElement("section");
      overview.className = "sv-card";
      overview.innerHTML = "<h2>Overview</h2>";
      overview.appendChild(row("Customer", customer ? customer.name : "—"));
      const statusRow = document.createElement("div");
      statusRow.className = "sv-row";
      statusRow.innerHTML = "<span>Status</span>";
      const statusVal = document.createElement("strong");
      statusVal.appendChild(S.UI.statusBadge(ro.status));
      statusRow.appendChild(statusVal);
      overview.appendChild(statusRow);
      if (vehicle.plate) overview.appendChild(row("Plate", vehicle.plate));
      if (vehicle.vin) overview.appendChild(row("VIN", vehicle.vin));
      if (ro.complaint) overview.appendChild(row("Concern", ro.complaint));

      const charges = document.createElement("section");
      charges.className = "sv-card";
      charges.innerHTML = "<h2>Charges</h2>";
      charges.appendChild(row("Parts supplied", S.formatMoney(ro.partsSupplied)));
      charges.appendChild(row("Labor", ro.laborHours + " hrs @ " + S.formatMoney(ro.laborRate) + "/hr"));
      charges.appendChild(row("Labor total", S.formatMoney(ro.laborTotal)));
      charges.appendChild(row("Subtotal", S.formatMoney(ro.subtotal)));
      charges.appendChild(row("Deposit", S.formatMoney(ro.deposit)));
      charges.appendChild(row("Balance due", S.formatMoney(ro.balanceDue)));

      const actions = document.createElement("div");
      actions.className = "sv-actions";
      const printBtn = document.createElement("button");
      printBtn.type = "button";
      printBtn.className = "sv-btn sv-btn--primary";
      printBtn.textContent = "Print repair summary";
      printBtn.addEventListener("click", () => S.openPrintableSummary(vehicleId));
      const dashLink = document.createElement("a");
      dashLink.href = "index.html";
      dashLink.className = "sv-btn sv-btn--secondary";
      dashLink.textContent = "Dashboard";
      actions.appendChild(printBtn);
      actions.appendChild(dashLink);

      mainEl.appendChild(overview);
      mainEl.appendChild(charges);
      mainEl.appendChild(actions);
    })();
  </script>
</body>
</html>
