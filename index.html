<!DOCTYPE html>
<html lang="en" data-theme="default" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>BuildPilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Inter:wght@300;400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/buildpilot-core.css" />
  <link rel="stylesheet" href="css/buildpilot-intelligence.css" />
  <link rel="stylesheet" href="css/buildpilot-ux.css" />
  <link rel="stylesheet" href="css/buildpilot-premium-overrides.css" />
  <style>
    :root {
      --svc-red: #FF3B30;
      --svc-cobalt: #3b9eff;
      --svc-cobalt-hi: #6eb8ff;
      --svc-cobalt-lo: #2563eb;
      --tick: 2px;

      --font-stack: var(--bp-font-body);
      --mono-stack: 'JetBrains Mono', 'Courier New', Courier, monospace;

      --motion-ease-fluid: cubic-bezier(0.4, 0, 0.2, 1);
      --motion-duration-fluid: 0.3s;
      --fluid-collapse-max: 800px;

      /* Mobile toolbar / safe-area (iOS HIG + Material) */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --header-toolbar-margin: 0.75rem;
      --header-info-btn-size: 3rem;
    }

    .dashboard-info-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 52%, #242426 100%);
      color: #ffffff;
      font-family: var(--mono-stack);
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
    }
    .dashboard-info-btn--header {
      position: static;
      width: var(--header-info-btn-size);
      height: var(--header-info-btn-size);
      min-width: var(--header-info-btn-size);
      min-height: var(--header-info-btn-size);
      border-radius: 999px;
      font-size: 0.85rem;
    }
    .dashboard-info-btn.bubble-tactile {
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 2px 4px -1px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    .dashboard-info-btn:hover { background: linear-gradient(180deg, #444446 0%, #353537 52%, #2c2c2e 100%); }
    .dashboard-info-btn:focus-visible {
      outline: 2px solid var(--svc-cobalt-hi);
      outline-offset: 2px;
    }
    .app-header-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
      flex: 1;
    }
    .app-header-logo {
      height: 2.125rem;
      width: auto;
      max-height: 2.25rem;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
    }
    .app-header-title {
      white-space: nowrap;
    }
    .app-header-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .dashboard-config-btn {
      flex-shrink: 0;
      width: var(--header-info-btn-size);
      height: var(--header-info-btn-size);
      min-width: var(--header-info-btn-size);
      min-height: var(--header-info-btn-size);
      border-radius: 999px;
      border: none;
      background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 52%, #242426 100%);
      color: #ffffff;
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .dashboard-config-btn.bubble-tactile {
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 2px 4px -1px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    .dashboard-config-btn:hover {
      background: linear-gradient(180deg, #444446 0%, #353537 52%, #2c2c2e 100%);
    }
    .dashboard-config-btn:focus-visible {
      outline: 2px solid var(--svc-cobalt-hi);
      outline-offset: 2px;
    }
    .project-stats-insights-mount {
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--svc-border-subtle);
    }
    .project-stats-insights-label {
      margin: 0 0 0.55rem;
      font-family: var(--mono-stack);
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--svc-text-subtle);
    }
    .bi-garage-embedded .bi-metrics {
      margin-bottom: 0.5rem;
    }
    .user-manual-version {
      margin: 0;
      font-family: var(--mono-stack);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--svc-text-subtle);
      white-space: nowrap;
    }
    .info-panel-sheet,
    .user-manual-sheet {
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      max-width: min(420px, 95vw);
      max-height: min(88vh, 720px);
      background: #121212;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .info-panel-header {
      position: relative;
      padding: 1.25rem 1.25rem 1rem;
      padding-right: 7.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .info-panel-version {
      position: absolute;
      top: 1.15rem;
      right: 1.15rem;
      margin: 0;
      font-family: var(--mono-stack);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--svc-text-subtle);
      white-space: nowrap;
    }
    .info-panel-title {
      margin: 0;
      color: #ffffff;
      font-family: 'Archivo', var(--font-stack);
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .info-panel-tagline {
      margin: 0.4rem 0 0;
      color: rgba(236, 238, 242, 0.72);
      font-size: 0.8rem;
      line-height: 1.45;
    }
    .info-panel-body {
      flex: 1 1 auto;
      min-height: 0;
      padding: 1rem 1.25rem;
    }
    .info-panel-hint {
      margin: 0;
      color: rgba(236, 238, 242, 0.65);
      font-size: 0.78rem;
      line-height: 1.5;
      text-align: center;
    }
    .info-panel-footer {
      padding: 0.85rem 1.25rem 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      background: #0f0f0f;
    }
    .info-panel-action-btn {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: linear-gradient(180deg, #2a2a2c 0%, #1e1e20 100%);
      color: #ffffff;
      font-family: 'Archivo', var(--font-stack);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
    }
    .user-manual-intro {
      margin: 0;
      padding: 1rem 1.25rem 0.85rem;
      color: rgba(236, 238, 242, 0.78);
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .user-manual-legend-block {
      padding: 0.65rem 1.25rem 0.9rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .user-manual-legend-block:last-child {
      border-bottom: none;
    }
    .user-manual-legend-title {
      margin: 0 0 0.55rem;
      color: rgba(236, 238, 242, 0.55);
      font-family: var(--mono-stack);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .user-manual-legend-grid {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .user-manual-legend-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .user-manual-swatch {
      flex-shrink: 0;
      width: 2.25rem;
      height: 1.35rem;
      border-radius: 6px;
      border: 2px solid currentColor;
      background: transparent;
      box-sizing: border-box;
    }
    .user-manual-swatch--fill {
      background: color-mix(in srgb, currentColor 18%, transparent);
    }
    .user-manual-legend-label {
      flex: 1 1 auto;
      min-width: 0;
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .user-manual-legend-desc {
      display: block;
      margin-top: 0.1rem;
      color: rgba(236, 238, 242, 0.62);
      font-size: 0.72rem;
      font-weight: 500;
    }
    /* Material-style instruction bullets (filled circle, 24px inset) */
    .user-manual-bullet-list {
      list-style: none;
      margin: 0;
      padding: 0.5rem 0 0.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .user-manual-bullet-list--compact {
      gap: 0.65rem;
    }
    .user-manual-bullet-list li {
      position: relative;
      margin: 0;
      padding: 0 0 0 1.5rem;
      color: rgba(236, 238, 242, 0.88);
      font-size: 0.82rem;
      line-height: 1.55;
      letter-spacing: 0.01em;
    }
    .user-manual-bullet-list li::before {
      content: "";
      position: absolute;
      left: 0.35rem;
      top: 0.62em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(236, 238, 242, 0.72);
      transform: translateY(-50%);
      box-shadow: none;
    }
    .user-manual-bullet-list li strong {
      font-weight: 700;
      color: #ffffff;
    }
    .user-manual-intro strong,
    .user-manual-section-heading strong,
    .user-manual-legend-desc strong {
      font-weight: 700;
      color: #ffffff;
    }
    .user-manual-header--guide {
      padding-right: 1.25rem;
    }
    .user-manual-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .user-manual-back-btn {
      flex-shrink: 0;
      min-height: 44px;
      padding: 0.35rem 0.65rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: transparent;
      color: var(--svc-cobalt-hi);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .about-modal-prose {
      padding: 0.9rem 1.25rem 1.1rem;
    }
    .about-modal-p {
      margin: 0 0 1.05rem;
      color: rgba(236, 238, 242, 0.9);
      font-family: var(--font-stack);
      font-size: 0.84rem;
      font-weight: 400;
      line-height: 1.68;
      letter-spacing: 0.01em;
    }
    .about-modal-p:last-child {
      margin-bottom: 0;
    }
    .about-modal-p strong {
      color: #ffffff;
      font-weight: 800;
    }
    .about-modal-divider {
      margin: 1.15rem 0 1.2rem;
      color: rgba(236, 238, 242, 0.35);
      font-family: var(--mono-stack);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1;
      text-align: center;
      user-select: none;
    }
    .about-modal-section-title {
      margin: 0 0 0.95rem;
      color: #ffffff;
      font-family: 'Archivo', var(--font-stack);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.4;
    }
    .about-modal-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.95rem;
    }
    .about-modal-list li {
      position: relative;
      margin: 0;
      padding-left: 1.05rem;
      color: rgba(236, 238, 242, 0.88);
      font-family: var(--font-stack);
      font-size: 0.82rem;
      line-height: 1.65;
      letter-spacing: 0.01em;
    }
    .about-modal-list li::before {
      content: "\2022";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--svc-cobalt-hi);
      font-weight: 700;
    }
    .user-manual-body--scroll {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1 1 auto;
      min-height: 0;
    }
    .mission-modal-body {
      font-family: var(--mono-stack);
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--svc-text-soft);
    }
    .mission-modal-stage {
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, transform;
    }
    .mission-modal-stage.is-swapping {
      opacity: 0;
      transform: translateY(6px);
    }
    .mission-modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .mission-modal-action-btn {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--svc-cobalt-hi);
      border-radius: 7px;
      background: transparent;
      color: var(--svc-cobalt-hi);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      min-height: 40px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mission-modal-action-btn:hover {
      background: rgba(93, 155, 255, 0.12);
    }
    .mission-support-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.15rem;
    }
    .mission-support-form-title {
      margin: 0;
      font-family: 'Archivo', var(--font-stack);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.35;
      color: var(--svc-text);
    }
    .mission-support-field-label {
      display: block;
      margin-bottom: 0.35rem;
      font-family: 'JetBrains Mono', var(--mono-stack);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(200, 205, 214, 0.75);
    }
    .mission-support-textarea,
    .mission-support-email-input {
      width: 100%;
      box-sizing: border-box;
      background: #1a1a1a;
      color: #eceef2;
      border: 1px solid #222222;
      border-radius: 10px;
      font-family: var(--font-stack);
      font-size: 0.88rem;
      line-height: 1.55;
      transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mission-support-textarea {
      min-height: 7.5rem;
      padding: 0.75rem 0.85rem;
      resize: vertical;
    }
    .mission-support-email-input {
      min-height: 44px;
      padding: 0.65rem 0.85rem;
    }
    .mission-support-textarea:focus,
    .mission-support-email-input:focus {
      outline: none;
      border-color: var(--svc-cobalt);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
    }
    .mission-support-textarea::placeholder,
    .mission-support-email-input::placeholder {
      color: rgba(176, 176, 181, 0.72);
    }
    .mission-support-btn-row {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.35rem;
    }
    .mission-support-send-btn {
      flex: 2;
      min-height: 48px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #24884a 0%, #1d7340 52%, #145a32 100%);
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mission-support-send-btn.bubble-tactile {
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 2px 4px -1px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 0 16px rgba(29, 115, 64, 0.28);
    }
    .mission-support-send-btn:hover {
      box-shadow:
        0 6px 10px -2px rgba(0, 0, 0, 0.34),
        0 3px 6px -1px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 0 24px rgba(29, 115, 64, 0.4);
    }
    .mission-support-send-btn:active {
      background: linear-gradient(180deg, #1d7340 0%, #145a32 100%);
      transform: scale(0.95) translateZ(0);
    }
    .mission-support-back-btn {
      flex: 1;
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 12px;
      background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 52%, #242426 100%);
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mission-support-back-btn.bubble-tactile {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 2px 4px -1px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .mission-support-textarea.is-invalid {
      border-color: rgba(220, 80, 80, 0.65);
      box-shadow: 0 0 0 3px rgba(220, 80, 80, 0.18);
    }
    .mission-support-confirmation {
      text-align: center;
      font-size: 0.9rem;
      color: var(--svc-text);
      padding: 0.75rem 0 0.25rem;
      line-height: 1.65;
    }
    .mission-support-error {
      margin: 0;
      font-size: 0.72rem;
      color: rgba(255, 140, 140, 0.95);
      line-height: 1.45;
    }
    .mission-support-send-btn.is-transmitting,
    .mission-support-back-btn.is-transmitting {
      opacity: 0.72;
      pointer-events: none;
      cursor: wait;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    button, [role="button"], summary { touch-action: manipulation; }

    button,
    input[type="button"],
    input[type="submit"],
    input[type="reset"],
    [role="button"],
    .dashboard-info-btn,
    .dashboard-config-btn,
    .dashboard-toolbar-btn,
    .templates-menu-btn,
    .vault-export-btn,
    .vault-import-btn,
    .user-manual-dismiss-btn,
    .info-panel-action-btn,
    .user-manual-back-btn,
    .about-modal-p,
    .mission-modal-action-btn,
    .mission-support-send-btn,
    .mission-support-back-btn,
    .add-vehicle-btn,
    .bulk-btn,
    .vehicle-delete-btn,
    .modal-btn-row button,
    a.vehicle-card-body {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    button:not(:disabled):active,
    input[type="button"]:not(:disabled):active,
    input[type="submit"]:not(:disabled):active,
    input[type="reset"]:not(:disabled):active,
    [role="button"]:not([aria-disabled="true"]):active,
    .dashboard-info-btn:active,
    .dashboard-config-btn:active,
    .dashboard-toolbar-btn:active,
    .templates-menu-btn:active,
    .vault-export-btn:active,
    .vault-import-btn:active,
    .user-manual-dismiss-btn:active,
    .info-panel-action-btn:active,
    .user-manual-back-btn:active,
    .mission-modal-action-btn:active,
    .mission-support-send-btn:active,
    .mission-support-back-btn:active,
    .add-vehicle-btn:active,
    .bulk-btn:active,
    .vehicle-delete-btn:active,
    .modal-btn-row button:active,
    a.vehicle-card-body:active {
      transform: scale(0.95) translateZ(0);
    }

    body {
      margin: 0;
      background: #000000;
      color: var(--svc-text);
      font-family: var(--font-stack);
      font-size: 16px;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button { min-height: 48px; }

    .main-shell {
      background: #000000;
      padding: 0;
      padding-left: max(0px, env(safe-area-inset-left));
      padding-right: max(0px, env(safe-area-inset-right));
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }
    .main-shell-inner {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 1.1rem 1.15rem 2rem;
    }
    @media (min-width: 390px) {
      .main-shell-inner {
        padding-left: 1.125rem;
        padding-right: 1.125rem;
      }
    }
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding-top: 0.35rem;
      padding-bottom: 0.35rem;
      margin: 0;
      text-align: center;
    }
    .brand-header-logo {
      display: block;
      max-height: 76px;
      width: auto;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
    }
