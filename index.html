  <input id="vault-import-input" type="file" accept=".json,application/json" style="display:none;" />
  <script src="buildpilot-logo-embed.js"></script>
  <script src="js/buildpilot-storage.js"></script>
  <script src="js/buildpilot-manifest-export.js"></script>
  <script src="js/buildpilot-inventory.js"></script>
  <script src="js/buildpilot-config-panel.js"></script>
  <script src="js/buildpilot-intelligence.js"></script>
  <script>
    // --- Local Storage key
    const LS_VEHICLES_KEY = 'buildpilot_vehicles';
    const LEGACY_LS_VEHICLES_KEY = 'vehicles';
    const LS_SELECTED_VEHICLE_ID_KEY = 'selectedVehicleId';

    /** Project builds only ? customer shop vehicles use vehicleMode: 'customer'. */
    function isProjectVehicle(v) {
      if (!v) return false;
      return !v.vehicleMode || v.vehicleMode === 'project';
    }
    function filterProjectVehicles(list) {
      return (list || []).filter(isProjectVehicle);
    }
    const BUILDPILOT_VAULT_VERSION = 1;
    const BUILDPILOT_APP_VERSION = "1.0.0";
    const BUILDPILOT_VAULT_FILENAME = 'BuildPilot_Master_Backup.json';
    const BUILDPILOT_VEHICLE_KEY_PATTERN = /^vehicle_(parts|tasks|labor|reg_expiry|system_state)_/;
    const FORMSPREE_SUPPORT_ENDPOINT = "https://formspree.io/f/xeedozwb";

    function isBuildPilotStorageKey(key) {
      if (window.BuildPilotStorage && window.BuildPilotStorage.isBuildPilotUserDataKey) {
        return window.BuildPilotStorage.isBuildPilotUserDataKey(key);
      }
      if (!key) return false;
      if (key === LS_VEHICLES_KEY || key === LEGACY_LS_VEHICLES_KEY || key === LS_SELECTED_VEHICLE_ID_KEY) return true;
      return BUILDPILOT_VEHICLE_KEY_PATTERN.test(key);
    }

    function collectBuildPilotVaultSnapshot() {
      const entries = {};
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (!isBuildPilotStorageKey(key)) continue;
        const raw = localStorage.getItem(key);
        if (raw == null) continue;
        try {
          entries[key] = JSON.parse(raw);
        } catch (_err) {
          entries[key] = raw;
        }
      }
      return {
        buildPilotVaultVersion: BUILDPILOT_VAULT_VERSION,
        app: 'BuildPilot',
        appVersion: BUILDPILOT_APP_VERSION,
        exportedAt: new Date().toISOString(),
        vehicleCount: Array.isArray(entries[LS_VEHICLES_KEY]) ? entries[LS_VEHICLES_KEY].length : 0,
        entries
      };
    }

    /** Merge legacy per-vehicle keys into canonical vehicle records before backup/export. */
    function syncAllLiveGarageDataBeforeExport() {
      migrateLegacyKeysOntoVehicles();
      let vehicles = loadVehicles();
      let dirty = false;
      vehicles.forEach((v) => {
        if (!v || typeof v !== "object") return;
        hydrateVehicleRecordCollections(v);
        if (window.BuildPilotInventory) {
          window.BuildPilotInventory.ensureVehicleInventory(v);
        }
        dirty = true;
      });
      if (dirty) {
        if (window.BuildPilotStorage && window.BuildPilotStorage.writeVehiclesArrayToLocalStorage) {
          window.BuildPilotStorage.writeVehiclesArrayToLocalStorage(vehicles);
        } else {
          saveVehicles(vehicles);
        }
      }
    }

    function notifyGarageDataUpdated(detail) {
      try {
        window.dispatchEvent(
          new CustomEvent("buildpilot:vehicles-updated", {
            detail: detail || { source: "garage-sync" }
          })
        );
      } catch (_e) { /* ignore */ }
    }

    function validateBuildPilotVaultPayload(data) {
      if (!data || typeof data !== 'object') {
        return { ok: false, error: 'Invalid backup file format.' };
      }
      const entries = data.entries || data.storage;
      if (!entries || typeof entries !== 'object' || Array.isArray(entries)) {
        return { ok: false, error: 'Backup is missing a valid storage entries object.' };
      }
      if (!Object.prototype.hasOwnProperty.call(entries, LS_VEHICLES_KEY)) {
        return { ok: false, error: 'Backup is missing the vehicles collection.' };
      }
              const vehicles = entries[LS_VEHICLES_KEY];
      if (!Array.isArray(vehicles)) {
        return { ok: false, error: 'The vehicles entry must be an array.' };
      }
      for (const vehicle of vehicles) {
        if (!vehicle || typeof vehicle !== 'object' || vehicle.id == null) {
          return { ok: false, error: 'One or more vehicle records are invalid.' };
        }
        hydrateVehicleRecordCollections(vehicle);
      }
      for (const [key, value] of Object.entries(entries)) {
        if (!isBuildPilotStorageKey(key)) continue;
        if (key.startsWith('vehicle_parts_') || key.startsWith('vehicle_tasks_') || key.startsWith('vehicle_labor_')) {
          if (value != null && !Array.isArray(value)) {
            return { ok: false, error: `Invalid array data for ${key}.` };
          }
        }
        if (key.startsWith('vehicle_system_state_') && value != null && (typeof value !== 'object' || Array.isArray(value))) {
          return { ok: false, error: `Invalid system state object for ${key}.` };
        }
        if (key === LS_SELECTED_VEHICLE_ID_KEY && value != null && typeof value !== 'string' && typeof value !== 'number') {
          return { ok: false, error: 'Selected vehicle id must be a string or number.' };
        }
        if (key.startsWith('vehicle_reg_expiry_') && value != null && typeof value !== 'string') {
          return { ok: false, error: `Invalid registration expiry value for ${key}.` };
        }
      }
      return { ok: true, entries };
    }

    function writeBuildPilotVaultEntry(key, value) {
      if (value == null) {
        localStorage.removeItem(key);
        return;
      }
      if (typeof value === 'string') {
        localStorage.setItem(key, value);
        return;
      }
      localStorage.setItem(key, JSON.stringify(value));
    }

    function importBuildPilotVaultEntries(entries) {
      const existingKeys = [];
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (isBuildPilotStorageKey(key)) existingKeys.push(key);
      }
      existingKeys.forEach((key) => localStorage.removeItem(key));
      Object.entries(entries).forEach(([key, value]) => {
        if (!isBuildPilotStorageKey(key)) return;
        writeBuildPilotVaultEntry(key, value);
      });
    }

    function closeTemplatesPanel() {
      const templatesPanel = document.getElementById('templates-panel');
      const templatesToggle = document.getElementById('templates-toggle');
      if (templatesPanel) setFluidCollapsePanel(templatesPanel, false);
      if (templatesToggle) templatesToggle.setAttribute('aria-expanded', 'false');
    }

    function exportBuildPilotVault() {
      syncAllLiveGarageDataBeforeExport();
      const payload = collectBuildPilotVaultSnapshot();
      const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const objectUrl = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = objectUrl;
      anchor.download = `BuildPilot_Master_Backup_${stamp}.json`;
      anchor.rel = "noopener";
      anchor.style.display = "none";
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      window.setTimeout(() => URL.revokeObjectURL(objectUrl), 500);
      closeTemplatesPanel();
    }

    function wireVaultActions() {
      const exportBtn = document.getElementById('vault-export-btn');
      const importBtn = document.getElementById('vault-import-btn');
      const importInput = document.getElementById('vault-import-input');
      if (exportBtn) {
        exportBtn.addEventListener('click', () => {
          try {
            exportBuildPilotVault();
          } catch (err) {
            alert(err && err.message ? err.message : 'Could not save your project backup file.');
          }
        });
      }
      if (importBtn && importInput) {
        importBtn.addEventListener('click', () => {
          importInput.value = '';
          importInput.click();
          closeTemplatesPanel();
        });
        importInput.addEventListener('change', () => {
          const file = importInput.files && importInput.files[0];
          if (!file) return;
          const lower = String(file.name || '').toLowerCase();
          if (!lower.endsWith('.json')) {
            alert('Please choose a BuildPilot project backup file.');
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const parsed = JSON.parse(String(reader.result || ''));
              const validation = validateBuildPilotVaultPayload(parsed);
              if (!validation.ok) throw new Error(validation.error);
              const vehicleCount = Array.isArray(validation.entries[LS_VEHICLES_KEY])
                ? validation.entries[LS_VEHICLES_KEY].length
                : 0;
              const confirmMsg = vehicleCount
                ? `Restore from this project backup file? It will replace all current BuildPilot data for ${vehicleCount} vehicle${vehicleCount === 1 ? '' : 's'}.`
                : 'Restore from this project backup file? It will replace all current BuildPilot data.';
              if (!confirm(confirmMsg)) return;
              importBuildPilotVaultEntries(validation.entries);
              migrateLegacyKeysOntoVehicles();
              renderVehicles();
              renderGarageInvestmentStats();
              renderGarageIntelligence();
              notifyGarageDataUpdated({ source: "vault-restore" });
              alert('Project restored successfully.');
            } catch (err) {
              alert(err && err.message ? err.message : 'Could not restore project from file.');
            }
          };
          reader.onerror = () => alert('Could not read the selected backup file.');
          reader.readAsText(file);
        });
      }
    }

    const CSV_CHAPTER_VALUES = [
      "Engine",
      "Cooling System",
      "Fuel System",
      "Exhaust System",
      "Drivetrain",
      "Brakes",
      "Suspension & Steering",
      "Electrical & Ignition",
      "Body & Exterior",
      "Interior",
      "Wheels & Tires"
    ];
    const PART_STATUS_VALUES = ["Needed", "Ordered", "Received", "Installed"];
    const PART_STATUS_VALUES_LEGACY_EXPORT = ["Needed", "Ordered", "Received", "Installed"];
    const TASK_STATUS_VALUES = ["Pending", "In Progress", "Complete"];
    const LABOR_STATUS_VALUES = ["Pending", "In Progress", "Complete"];
    const CSV_STATUS_VALUES = [...new Set([...PART_STATUS_VALUES, ...TASK_STATUS_VALUES, ...LABOR_STATUS_VALUES])];
    /** Spreadsheet conditional-format palette ? soft Orange / Purple / Gold / Green */
    const MANIFEST_CF_COLORS = {
      orange: "FFFDE8D0",
      orangeFg: "FF9A3412",
      purple: "FFF3E8FF",
      purpleFg: "FF6B21A8",
      gold: "FFFEF9C3",
      goldFg: "FF854D0E",
      green: "FFDCFCE7",
      greenFg: "FF166534"
    };

    function manifestStatusDropdownFormula() {
      return `"${CSV_STATUS_VALUES.join(",")}"`;
    }
    /** Build Planner manifest: row 1 brand, rows 2?4 vehicle meta, row 6 headers, row 7+ line items. */
    const MANIFEST_TEMPLATE_HEADER_ROW = (window.BuildPilotManifestExport && window.BuildPilotManifestExport.TEMPLATE.HEADER_ROW) || 7;
    const MANIFEST_TEMPLATE_FIRST_ROW = (window.BuildPilotManifestExport && window.BuildPilotManifestExport.TEMPLATE.FIRST_ROW) || 8;
    const MANIFEST_TEMPLATE_LAST_ROW = (window.BuildPilotManifestExport && window.BuildPilotManifestExport.TEMPLATE.LAST_ROW) || 102;
    const MANIFEST_TEMPLATE_ITEM_ROWS = MANIFEST_TEMPLATE_LAST_ROW - MANIFEST_TEMPLATE_FIRST_ROW + 1;

    function isSpreadsheetTemplateSheetName(sheetName) {
      const s = String(sheetName || "").trim();
      if (!s) return false;
      return /^(add\s*new\s*vehicle|template|instructions?|readme|sheet\s*guide)$/i.test(s);
    }

    function isSpreadsheetTemplateHelperText(text) {
      const s = String(text || "").trim();
      if (!s) return false;
      if (/^add\s*new\s*vehicle$/i.test(s)) return true;
      if (/^\(new\s*vehicle\)$/i.test(s)) return true;
      if (/^\(?\s*new\s*vehicle\s*\)?$/i.test(s)) return true;
      if (/^vehicle\s*year,?\s*make\s*and\s*model:\s*\(new\s*vehicle\)$/i.test(s)) return true;
      if (/^vehicle\s*year,?\s*make\s*and\s*model:\s*\(?\s*new\s*vehicle\s*\)?$/i.test(s)) return true;
      if (/^build\s*manifest:\s*$/i.test(s)) return true;
      if (/^example(\s+vehicle)?$/i.test(s)) return true;
      if (/^template\b/i.test(s)) return true;
      if (/^click\s+here\b/i.test(s)) return true;
      if (/^instructions?:/i.test(s)) return true;
      if (/^do\s+not\s+import/i.test(s)) return true;
      if (/^your\s+vehicle/i.test(s)) return true;
      if (/^enter\s+(vehicle|name)/i.test(s)) return true;
      if (/^sample\b/i.test(s)) return true;
      if (/^blank\b/i.test(s)) return true;
      return false;
    }

    function isSpreadsheetTemplateVehicleName(name) {
      const s = String(name || "").trim();
      if (!s) return true;
      if (isSpreadsheetTemplateHelperText(s)) return true;
      if (/^\(?\s*new\s*vehicle\s*\)?$/i.test(s)) return true;
      if (/new\s*vehicle/i.test(s) && s.replace(/[^a-z0-9]/gi, "").length <= 12) return true;
      return false;
    }

    /** Explicit phantom-vehicle / template-instruction row guard for import loops. */
    function shouldSkipSpreadsheetImportRow(...cellValues) {
      return cellValues.some(value => {
        const s = String(value == null ? "" : value).trim();
        if (!s) return false;
        if (s === "(New Vehicle)" || s === "(new vehicle)") return true;
        if (/^add\s+new\s+vehicle$/i.test(s)) return true;
        return isSpreadsheetTemplateVehicleName(s) || isSpreadsheetTemplateHelperText(s);
      });
    }

    function extractManifestProjectNameFromTitleLine(titleLine) {
      const line = String(titleLine || "").trim();
      if (!line || isSpreadsheetTemplateHelperText(line)) return "";
      const buildMatch = line.match(/^BUILD MANIFEST:\s*(.+)$/i);
      if (buildMatch) {
        const name = buildMatch[1].trim();
        return isSpreadsheetTemplateVehicleName(name) ? "" : name;
      }
      const ymmMatch = line.match(/^Vehicle\s*Year,?\s*Make\s*and\s*Model:\s*(.+)$/i);
      if (ymmMatch) {
        const name = ymmMatch[1].trim();
        return isSpreadsheetTemplateVehicleName(name) ? "" : name;
      }
      return "";
    }

    function shouldRejectSpreadsheetImportPayload(payload, sheetName) {
      if (!payload) return true;
      if (isSpreadsheetTemplateSheetName(sheetName)) return true;
      const projectName = String(payload.project && payload.project.Project_Name || "").trim();
      if (isSpreadsheetTemplateVehicleName(projectName)) return true;
      const hasItems = Array.isArray(payload.items) && payload.items.some(item => String(item && item.name || "").trim());
      if (!hasItems && isSpreadsheetTemplateVehicleName(projectName)) return true;
      return false;
    }

    const VALIDATION_LISTS_SHEET = "ValidationLists";
    const MANIFEST_STATUS_UNIVERSAL_LIST = `"${CSV_STATUS_VALUES.join(",")}"`;

    function validationListsColumnLetter(index) {
      return String.fromCharCode(64 + index);
    }

    function validationListsRowRange(rowNumber, itemCount) {
      const endCol = validationListsColumnLetter(itemCount);
      return `'${VALIDATION_LISTS_SHEET}'!$A$${rowNumber}:$${endCol}$${rowNumber}`;
    }

    function ensureValidationListsSheet(workbook) {
      if (workbook.__validationListsReady) return;
      let sheet = workbook.getWorksheet(VALIDATION_LISTS_SHEET);
      if (!sheet) {
        sheet = workbook.addWorksheet(VALIDATION_LISTS_SHEET);
        if ("state" in sheet) sheet.state = "veryHidden";
        PART_STATUS_VALUES.forEach((val, idx) => { sheet.getCell(1, idx + 1).value = val; });
        TASK_STATUS_VALUES.forEach((val, idx) => { sheet.getCell(2, idx + 1).value = val; });
        LABOR_STATUS_VALUES.forEach((val, idx) => { sheet.getCell(3, idx + 1).value = val; });
      }
      workbook.__validationListsReady = true;
    }

    function validationListRangeForType(typeVal) {
      const t = String(typeVal || "").trim();
      if (t === "Part") return validationListsRowRange(1, PART_STATUS_VALUES.length);
      if (t === "Task") return validationListsRowRange(2, TASK_STATUS_VALUES.length);
      if (t === "Outside Labor") return validationListsRowRange(3, LABOR_STATUS_VALUES.length);
      return null;
    }

    function manifestStatusListValidationFormula(rowNumber) {
      const partRange = validationListsRowRange(1, PART_STATUS_VALUES.length);
      const taskRange = validationListsRowRange(2, TASK_STATUS_VALUES.length);
      const laborRange = validationListsRowRange(3, LABOR_STATUS_VALUES.length);
      return `IF($B${rowNumber}="Part",${partRange},IF($B${rowNumber}="Task",${taskRange},IF($B${rowNumber}="Outside Labor",${laborRange},${MANIFEST_STATUS_UNIVERSAL_LIST})))`;
    }

    function manifestStatusCustomValidationFormula(rowNumber) {
      const s = VALIDATION_LISTS_SHEET;
      const r = rowNumber;
      return `OR($G${r}="",AND($B${r}="Part",COUNTIF('${s}'!$A$1:$D$1,$G${r})>0),AND($B${r}="Task",COUNTIF('${s}'!$A$2:$C$2,$G${r})>0),AND($B${r}="Outside Labor",COUNTIF('${s}'!$A$3:$C$3,$G${r})>0),AND($B${r}="",OR(COUNTIF('${s}'!$A$1:$D$1,$G${r})>0,COUNTIF('${s}'!$A$2:$C$2,$G${r})>0,COUNTIF('${s}'!$A$3:$C$3,$G${r})>0)))`;
    }

    function applyManifestStatusCellValidation(excelRow) {
      excelRow.getCell("G").dataValidation = {
        type: "list",
        allowBlank: true,
        showInputMessage: true,
        promptTitle: "Status options",
        prompt: "Part: Needed, Ordered, Received, Installed. Task/Labor: Pending, In Progress, Complete.",
        showErrorMessage: true,
        errorTitle: "Invalid Status for Type",
        error: "Status must match Type. Part ? Needed/Ordered/Received/Installed. Task or Outside Labor ? Pending/In Progress/Complete.",
        formulae: [`=${manifestStatusListValidationFormula(excelRow.number)}`]
      };
    }

    function applyManifestStatusFallbackValidation(excelRow) {
      excelRow.getCell("G").dataValidation = {
        type: "custom",
        allowBlank: true,
        showInputMessage: true,
        promptTitle: "Status options",
        prompt: `Allowed: ${CSV_STATUS_VALUES.join(", ")}. Status must match row Type when Type is set.`,
        showErrorMessage: true,
        errorTitle: "Status does not match Type",
        error: "Part ? Needed/Ordered/Received/Installed. Task or Outside Labor ? Pending/In Progress/Complete.",
        formulae: [`=${manifestStatusCustomValidationFormula(excelRow.number)}`]
      };
    }

    function applyManifestStatusLogicalValidation(excelRow) {
      excelRow.getCell("G").dataValidation = {
        type: "custom",
        allowBlank: true,
        showErrorMessage: true,
        errorTitle: "Status does not match Type",
        error: "Part ? Needed/Ordered/Received/Installed. Task or Outside Labor ? Pending/In Progress/Complete.",
        formulae: [`=${manifestStatusCustomValidationFormula(excelRow.number)}`]
      };
    }

    function manifestStatusListForType(typeVal) {
      const t = String(typeVal || "").trim();
      if (t === "Task" || t === "Outside Labor") return TASK_STATUS_VALUES.slice();
      return PART_STATUS_VALUES.slice();
    }

    const BUILDPILOT_LOGO_FILENAME = "logo.png";
    let buildPilotLogoDataUrlCache = null;

    function resolveBuildPilotLogoUrl() {
      try {
        return new URL(BUILDPILOT_LOGO_FILENAME, window.location.href).href;
      } catch (_err) {
        return BUILDPILOT_LOGO_FILENAME;
      }
    }

    function readBlobAsDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    function loadBuildPilotLogoViaImageElement(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.decoding = "async";
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext("2d");
            if (!ctx) {
              reject(new Error("Canvas unavailable"));
              return;
            }
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch (err) {
            reject(err);
          }
        };
        img.onerror = () => reject(new Error("Logo image failed to load"));
        img.src = src;
      });
    }

    async function loadBuildPilotLogoDataUrl() {
      if (buildPilotLogoDataUrlCache) return buildPilotLogoDataUrlCache;
      if (typeof window.BUILDPILOT_LOGO_DATA_URL === "string" && window.BUILDPILOT_LOGO_DATA_URL.startsWith("data:image/")) {
        buildPilotLogoDataUrlCache = window.BUILDPILOT_LOGO_DATA_URL;
        return buildPilotLogoDataUrlCache;
      }
      const logoUrl = resolveBuildPilotLogoUrl();
      try {
        const res = await fetch(logoUrl, { cache: "force-cache" });
        if (res.ok) {
          buildPilotLogoDataUrlCache = await readBlobAsDataUrl(await res.blob());
          return buildPilotLogoDataUrlCache;
        }
      } catch (_fetchErr) { /* file:// fallback below */ }
      try {
        buildPilotLogoDataUrlCache = await loadBuildPilotLogoViaImageElement(logoUrl);
        return buildPilotLogoDataUrlCache;
      } catch (_imgErr) {
        return "";
      }
    }

    async function loadBuildPilotLogoBase64() {
      const dataUrl = await loadBuildPilotLogoDataUrl();
      if (!dataUrl) return "";
      const match = dataUrl.match(/^data:image\/\w+;base64,(.+)$/);
      return match ? match[1] : dataUrl.replace(/^data:image\/\w+;base64,/, "");
    }

    function applyManifestBrandHeaderRow(worksheet, workbook, logoBase64) {
      const M = window.BuildPilotManifestExport;
      if (M && M.applyManifestBrandHeaderRow) {
        M.applyManifestBrandHeaderRow(worksheet, workbook, logoBase64);
      }
    }

    function manifestStatusConditionalFormattingRules(cfFill) {
      const c = MANIFEST_CF_COLORS;
      const tone = (bg, fg) => ({ fill: cfFill(bg), font: { color: { argb: fg } } });
      return [
        { type: "containsText", operator: "containsText", text: "Installed", priority: 1, style: tone(c.green, c.greenFg) },
        { type: "containsText", operator: "containsText", text: "Complete", priority: 2, style: tone(c.green, c.greenFg) },
        { type: "containsText", operator: "containsText", text: "Received", priority: 3, style: tone(c.gold, c.goldFg) },
        { type: "containsText", operator: "containsText", text: "Pending", priority: 4, style: tone(c.orange, c.orangeFg) },
        { type: "containsText", operator: "containsText", text: "In Progress", priority: 5, style: tone(c.purple, c.purpleFg) },
        { type: "containsText", operator: "containsText", text: "Ordered", priority: 6, style: tone(c.purple, c.purpleFg) },
        { type: "containsText", operator: "containsText", text: "Needed", priority: 7, style: tone(c.orange, c.orangeFg) }
      ];
    }

    const MANIFEST_SHEET_COLUMN_COUNT = 9;
    const MANIFEST_WRAP_TEXT_COLUMNS = [6, 8];

    function excelCellTextLength(value) {
      if (value == null) return 0;
      if (value instanceof Date) return value.toLocaleDateString().length;
      if (typeof value === "object") {
        if (Object.prototype.hasOwnProperty.call(value, "text")) return String(value.text).length;
        if (Object.prototype.hasOwnProperty.call(value, "hyperlink")) {
          return String(value.hyperlink || value.text || "").length;
        }
        if (Object.prototype.hasOwnProperty.call(value, "result")) return String(value.result).length;
      }
      return String(value).length;
    }

    function autoBalanceManifestWorksheetColumns(worksheet, maxColumns = MANIFEST_SHEET_COLUMN_COUNT) {
      for (let colNum = 1; colNum <= maxColumns; colNum += 1) {
        const column = worksheet.getColumn(colNum);
        let maxLen = 0;
        column.eachCell({ includeEmpty: false }, (cell) => {
          maxLen = Math.max(maxLen, excelCellTextLength(cell.value));
        });
        column.width = Math.max(maxLen + 4, 12);
      }
    }

    function applyManifestWrapTextColumns(worksheet, firstRow, lastRow) {
      const wrapAlign = { wrapText: true, vertical: "middle" };
      for (let r = firstRow; r <= lastRow; r += 1) {
        MANIFEST_WRAP_TEXT_COLUMNS.forEach((colNum) => {
          const cell = worksheet.getRow(r).getCell(colNum);
          cell.alignment = { ...(cell.alignment || {}), ...wrapAlign };
        });
      }
    }

    function parseCost(cost) {
      if (cost == null || cost === "") return 0;
      if (typeof cost === "number") return Number.isFinite(cost) ? cost : 0;
      if (typeof cost !== "string") return 0;
      const clean = cost.replace(/[^0-9.\-]/g, "");
      if (!clean) return 0;
      const number = parseFloat(clean);
      return Number.isFinite(number) ? number : 0;
    }

    function sanitizeImportArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function sanitizeImportText(value) {
      if (value == null) return "";
      return String(value).trim();
    }

    function sanitizeImportNumber(value, fallback = 0) {
      const num = parseCost(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function sanitizeImportedPartRecord(part, vehicleId) {
      if (!part || typeof part !== "object") return null;
      try {
        const base = {
          ...part,
          name: sanitizeImportText(part.name) || "Part",
          category: sanitizeImportText(part.category),
          cost: sanitizeImportNumber(part.cost, 0),
          partUrl: sanitizeImportText(part.partUrl),
          trackingNumber: sanitizeImportText(part.trackingNumber)
        };
        if (window.BuildPilotInventory) {
          return window.BuildPilotInventory.normalizePart(base, vehicleId);
        }
        return { ...base, status: sanitizeImportText(part.status) || "Needed" };
      } catch (_err) {
        return null;
      }
    }

    function sanitizeImportedTaskRecord(task) {
      if (!task || typeof task !== "object") return null;
      try {
        const hrs = sanitizeImportNumber(task.estHours, 0);
        return {
          ...task,
          name: sanitizeImportText(task.name) || "Task",
          description: sanitizeImportText(task.description),
          category: sanitizeImportText(task.category),
          laborCost: sanitizeImportNumber(task.laborCost, 0),
          estHours: hrs > 0 ? hrs : "",
          status: sanitizeImportText(task.status) || "Pending"
        };
      } catch (_err) {
        return null;
      }
    }

    function sanitizeImportedLaborRecord(entry) {
      if (!entry || typeof entry !== "object") return null;
      try {
        return {
          ...entry,
          shop: sanitizeImportText(entry.shop) || sanitizeImportText(entry.name) || "Outside Labor",
          description: sanitizeImportText(entry.description),
          category: sanitizeImportText(entry.category),
          cost: sanitizeImportNumber(entry.cost, 0),
          estHours: sanitizeImportNumber(entry.estHours ?? entry.hours ?? entry.costHours, 0),
          status: sanitizeImportText(entry.status) || "Pending"
        };
      } catch (_err) {
        return null;
      }
    }

    function hydrateVehicleRecordCollections(vehicle) {
      if (!vehicle || typeof vehicle !== "object") return vehicle;
      try {
        vehicle.parts = sanitizeImportArray(vehicle.parts);
        vehicle.tasks = sanitizeImportArray(vehicle.tasks);
        vehicle.labor = sanitizeImportArray(vehicle.labor);
        vehicle.vehiclePurchasePrice = sanitizeImportNumber(vehicle.vehiclePurchasePrice, 0);
        vehicle.totalLaborCost = sanitizeImportNumber(vehicle.totalLaborCost, 0);
        vehicle.parts = vehicle.parts.map((p) => sanitizeImportedPartRecord(p, vehicle.id)).filter(Boolean);
        if (window.BuildPilotInventory) window.BuildPilotInventory.ensureVehicleInventory(vehicle);
        vehicle.tasks = vehicle.tasks.map(sanitizeImportedTaskRecord).filter(Boolean);
        vehicle.labor = vehicle.labor.map(sanitizeImportedLaborRecord).filter(Boolean);
      } catch (_err) {
        vehicle.parts = sanitizeImportArray(vehicle.parts);
        vehicle.tasks = sanitizeImportArray(vehicle.tasks);
        vehicle.labor = sanitizeImportArray(vehicle.labor);
      }
      return vehicle;
    }

    function sanitizeImportedLineItem(item) {
      if (!item || typeof item !== "object") return null;
      try {
        const type = normalizeCsvType(item.type);
        const name = sanitizeImportText(item.name);
        if (!type || !name) return null;
        return {
          chapter: normalizeSystemCategory(sanitizeImportText(item.chapter)),
          type,
          name,
          vendor: sanitizeImportText(item.vendor),
          description: sanitizeImportText(item.description),
          partPrice: sanitizeImportNumber(item.partPrice, 0),
          laborCost: sanitizeImportNumber(item.laborCost, 0),
          costHours: sanitizeImportNumber(item.costHours, 0),
          status: normalizeCsvStatus(sanitizeImportText(item.status), type),
          partUrl: sanitizeImportText(item.partUrl),
          trackingNumber: sanitizeImportText(item.trackingNumber)
        };
      } catch (_err) {
        return null;
      }
    }

    function sanitizeImportPayload(rawPayload) {
      if (!rawPayload || typeof rawPayload !== "object") return null;
      try {
        const project = rawPayload.project && typeof rawPayload.project === "object" ? rawPayload.project : {};
        const purchaseRaw = project.Purchase_Price;
        const sanitizedProject = {
          Project_Name: sanitizeImportText(project.Project_Name),
          Purchase_Price: purchaseRaw == null || sanitizeImportText(purchaseRaw) === ""
            ? null
            : sanitizeImportNumber(purchaseRaw, 0),
          Reg_Expiry: sanitizeImportText(project.Reg_Expiry),
          Reg_NonOp: !!project.Reg_NonOp
        };
        const items = [];
        sanitizeImportArray(rawPayload.items).forEach((item) => {
          const cleanItem = sanitizeImportedLineItem(item);
          if (cleanItem) items.push(cleanItem);
        });
        return { project: sanitizedProject, items };
      } catch (_err) {
        return null;
      }
    }

    function getStorageArray(key) {
      try {
        const arr = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(arr) ? arr : [];
      } catch {
        return [];
      }
    }

    function setStorageArray(key, arr) {
      localStorage.setItem(key, JSON.stringify(arr));
    }

    function getRegExpiryStorageKey(vehicleId) {
      return `vehicle_reg_expiry_${vehicleId}`;
    }

    function normalizeSystemCategory(value) {
      const raw = String(value || "").trim().toLowerCase();
      if (!raw) return "Engine";
      if (raw === "cooling system" || raw === "cooling") return "Cooling System";
      if (raw === "fuel system" || raw === "fuel") return "Fuel System";
      if (raw === "exhaust system" || raw === "exhaust") return "Exhaust System";
      if (raw === "electrical & ignition" || raw === "electrical" || raw === "ignition") return "Electrical & Ignition";
      if (raw === "body" || raw === "body & exterior") return "Body & Exterior";
      return CSV_CHAPTER_VALUES.find(c => c.toLowerCase() === raw) || "Engine";
    }

    function normalizeCsvType(value) {
      const raw = String(value || "").trim().toLowerCase();
      if (raw === "part" || raw === "parts") return "Part";
      if (raw === "task" || raw === "tasks") return "Task";
      if (raw === "outside labor" || raw === "labor") return "Outside Labor";
      return "";
    }

    function normalizeCsvStatus(value, itemType) {
      const raw = String(value || "").trim().toLowerCase();
      const type = itemType ? normalizeCsvType(itemType) : "";
      if (type === "Task" || type === "Outside Labor") {
        if (raw === "complete" || raw === "completed" || raw === "installed") return "Complete";
        if (raw === "in progress") return "In Progress";
        return "Pending";
      }
      if (window.BuildPilotInventory) {
        return window.BuildPilotInventory.normalizePartStatus(value);
      }
      if (raw === "needed" || raw === "pending" || raw === "planned" || raw === "removed" || raw === "researching" || raw === "archived") return "Needed";
      if (raw === "ordered" || raw === "in progress" || raw === "shipped" || raw === "backordered") return "Ordered";
      if (raw === "received" || raw === "delivered") return "Received";
      if (raw === "installed" || raw === "complete" || raw === "completed") return "Installed";
      const partMatch = PART_STATUS_VALUES.find(s => s.toLowerCase() === raw);
      return partMatch || "Needed";
    }

    function templateHeaders() {
      return [
        "Project_Name","Purchase_Price","Reg_Expiry","Reg_NonOp","Chapter","Type","Name","Description",
        "Part_Price","Labor_Cost","Cost_Hours","Status","Part_URL","Tracking_Number"
      ];
    }

    function manifestLineItemHeaders() {
      return ["Chapter", "Type", "Item Name", "Shop / Vendor", "Hours", "Cost", "Status", "URL", "Tracking"];
    }

    function formatUsdExcel(n) {
      const num = Number(n);
      if (!Number.isFinite(num)) return "$0.00";
      return `$${num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    function getRegistrationManifestLineForGarage(vehicle) {
      if (!vehicle) return "Registration Status: Not set | Expiry: ?";
      if (vehicle.regNonOp) return "Registration Status: Non-Op | Expiry: ?";
      const raw = localStorage.getItem(getRegExpiryStorageKey(vehicle.id));
      if (!raw) return "Registration Status: Not set | Expiry: ?";
      const expiry = new Date(raw);
      if (isNaN(expiry.getTime())) return "Registration Status: Not set | Expiry: ?";
      const display = expiry.toLocaleDateString("en-US", { month: "short", day: "2-digit", year: "numeric" });
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      expiry.setHours(0, 0, 0, 0);
      const deltaDays = Math.round((expiry - now) / (86400000));
      let statusLabel = "Current";
      if (deltaDays < 0) statusLabel = "Expired";
      else if (deltaDays <= 31) statusLabel = `Due in ${deltaDays} days`;
      return `Registration Status: ${statusLabel} | Expiry: ${display}`;
    }

    function computeVehicleTotalInvestmentGarage(vehicle, parts, labor) {
      const purchase = Number(vehicle.vehiclePurchasePrice) || 0;
      let partsTotal = 0;
      parts.forEach(p => {
        if (String(p.status || "").toLowerCase() === "needed") return;
        partsTotal += parseCost(p.cost);
      });
      let laborTotal = 0;
      labor.forEach(l => {
        if (l && (l.complete === true || l.completed === true)) laborTotal += parseCost(l.cost);
      });
      return purchase + partsTotal + laborTotal;
    }

    function formatManifestCostPriceExport(type, partPrice, laborCost, costHours) {
      const pp = parseCost(partPrice);
      const lc = parseCost(laborCost);
      const hrs = parseCost(costHours);
      if (type === "Part") return formatUsdExcel(pp);
      if (type === "Task") {
        const bits = [];
        if (Number.isFinite(lc) && lc !== 0) bits.push(formatUsdExcel(lc));
        if (Number.isFinite(hrs) && hrs !== 0) bits.push(`${hrs} hrs`);
        return bits.join(" ? ");
      }
      if (type === "Outside Labor") return formatUsdExcel(lc);
      return "";
    }

    function manifestLineItemRow(fields) {
      return [
        fields.chapter || "",
        fields.type || "",
        fields.name || "",
        fields.vendor || "",
        fields.hours || "",
        fields.cost || "",
        fields.status || "",
        fields.url || "",
        fields.tracking || ""
      ];
    }

    function applyManifestMetaRowsToSheet(sheet, vehicle, parts, tasks, labor, totalInv, purchase) {
      const M = window.BuildPilotManifestExport;
      const meta = M
        ? M.buildVehicleManifestMetaLines(vehicle, {
          parts,
          tasks,
          labor,
          totalInv,
          purchase,
          formatUsd: formatUsdExcel,
          getRegistrationLine: getRegistrationManifestLineForGarage
        })
        : null;
      sheet.mergeCells("A2:I2");
      sheet.getCell("A2").value = meta ? meta.line2 : `Vehicle: ${vehicle.name || "Vehicle"}`;
      sheet.mergeCells("A3:I3");
      sheet.getCell("A3").value = meta ? meta.line3 : "";
      sheet.mergeCells("A4:I4");
      sheet.getCell("A4").value = meta ? meta.line4 : "";
      sheet.mergeCells("A5:I5");
      sheet.getCell("A5").value = meta ? meta.line5 : getRegistrationManifestLineForGarage(vehicle);
      [2, 3, 4, 5].forEach((rowNum) => {
        const cell = sheet.getCell(`A${rowNum}`);
        cell.font = { name: "Calibri", size: rowNum === 2 ? 14 : 10, bold: rowNum === 2 };
        cell.alignment = { vertical: "middle", horizontal: "left", wrapText: true };
      });
    }

    function styleTemplateWorksheet(worksheet, lineItemRowCount) {
      const dataRows = Math.max(0, Number(lineItemRowCount) || 0);
      const styledRows = Math.max(MANIFEST_TEMPLATE_ITEM_ROWS, dataRows);
      const firstRow = MANIFEST_TEMPLATE_FIRST_ROW;
      const lastRow = MANIFEST_TEMPLATE_FIRST_ROW + styledRows - 1;
      const headerRowNum = MANIFEST_TEMPLATE_HEADER_ROW;
      worksheet.views = [{
        state: "frozen",
        xSplit: 0,
        ySplit: headerRowNum,
        topLeftCell: `A${MANIFEST_TEMPLATE_FIRST_ROW}`
      }];
      const M = window.BuildPilotManifestExport;
      if (M && M.applyProfessionalTemplateHeaderStyle) {
        M.applyProfessionalTemplateHeaderStyle(worksheet, headerRowNum);
      } else {
        const headerRow = worksheet.getRow(headerRowNum);
        headerRow.height = 24;
        headerRow.eachCell({ includeEmpty: true }, (cell, colNum) => {
          if (colNum < 1 || colNum > 9) return;
          cell.font = { bold: true, color: { argb: "FFFFFFFF" }, size: 10 };
          cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FF0D0D11" } };
          cell.alignment = { vertical: "middle", horizontal: "center", wrapText: true };
        });
      }
      worksheet.autoFilter = { from: `A${headerRowNum}`, to: `I${headerRowNum}` };

      const cfFill = M && M.applyProfessionalTemplateGridStyle
        ? M.applyProfessionalTemplateGridStyle(worksheet, firstRow, lastRow)
        : (argb) => ({ type: "pattern", pattern: "solid", fgColor: { argb } });

      if (!M || !M.applyProfessionalTemplateGridStyle) {
        const thinEdge = { style: "thin", color: { argb: "FFD4D4D8" } };
        const gridBorder = { top: thinEdge, left: thinEdge, bottom: thinEdge, right: thinEdge };
        const dropdownFill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFF4F4F5" } };
        for (let r = firstRow; r <= lastRow; r++) {
          const row = worksheet.getRow(r);
          for (let c = 1; c <= 9; c++) {
            const cell = row.getCell(c);
            cell.border = gridBorder;
            if (c === 6) cell.numFmt = "$#,##0.00";
            if (c === 2 || c === 7) cell.fill = dropdownFill;
          }
        }
      }

      applyManifestWrapTextColumns(worksheet, firstRow, lastRow);

      worksheet.addConditionalFormatting({
        ref: `G${firstRow}:G${lastRow}`,
        rules: manifestStatusConditionalFormattingRules(cfFill)
      });

      autoBalanceManifestWorksheetColumns(worksheet);
    }

    function applyManifestRowValidation(excelRow) {
      const chapterFormula = `"${CSV_CHAPTER_VALUES.join(",")}"`;
      excelRow.getCell("A").dataValidation = {
        type: "list", allowBlank: true, formulae: [chapterFormula]
      };
      excelRow.getCell("B").dataValidation = {
        type: "list", allowBlank: true, formulae: ['"Part,Task,Outside Labor"']
      };
      applyManifestStatusCellValidation(excelRow);
    }

    function applyManifestTemplateRowValidations(worksheet) {
      for (let r = MANIFEST_TEMPLATE_FIRST_ROW; r <= MANIFEST_TEMPLATE_LAST_ROW; r += 1) {
        applyManifestRowValidation(worksheet.getRow(r));
      }
    }

    function safeSheetName(raw, usedNames) {
      let name = String(raw || "Vehicle").replace(/[\\/?*:[\]]/g, " ").trim();
      if (!name) name = "Vehicle";
      name = name.slice(0, 31);
      let candidate = name;
      let n = 2;
      while (usedNames.has(candidate)) {
        const suffix = ` ${n}`;
        candidate = `${name.slice(0, Math.max(1, 31 - suffix.length))}${suffix}`;
        n += 1;
      }
      usedNames.add(candidate);
      return candidate;
    }

    function extractExcelJsCellValue(cell) {
      if (!cell) return "";
      const value = cell.value;
      if (value == null) return "";
      if (value instanceof Date) return value;
      if (typeof value === "object") {
        if (Object.prototype.hasOwnProperty.call(value, "result")) return value.result;
        if (Object.prototype.hasOwnProperty.call(value, "text")) return value.text;
        if (Object.prototype.hasOwnProperty.call(value, "hyperlink")) return value.hyperlink;
      }
      return value;
    }

    function normalizeBuildType(vehicleOrRaw) {
      if (window.BuildPilotStorage && window.BuildPilotStorage.normalizeBuildType) {
        return window.BuildPilotStorage.normalizeBuildType(vehicleOrRaw);
      }
      const raw = typeof vehicleOrRaw === "object"
        ? String(vehicleOrRaw && vehicleOrRaw.buildType || "standard")
        : String(vehicleOrRaw || "standard");
      return raw.toLowerCase() === "custom" ? "custom" : "standard";
    }

    function normalizeVehicleStatus(vehicleOrRaw) {
      const raw = typeof vehicleOrRaw === "object"
        ? String(vehicleOrRaw && vehicleOrRaw.status || "active")
        : String(vehicleOrRaw || "active");
      const lower = raw.toLowerCase();
      if (lower === "sold") return "completed";
      if (lower === "completed" || lower === "complete" || lower === "archived") return "completed";
      return "active";
    }

    function ensureVehicleBuildSchema(vehicle) {
      if (!vehicle) return vehicle;
      if (window.BuildPilotStorage && window.BuildPilotStorage.ensureVehicleBuildSchema) {
        return window.BuildPilotStorage.ensureVehicleBuildSchema(vehicle);
      }
      vehicle.buildType = normalizeBuildType(vehicle);
      if (!Array.isArray(vehicle.customSegments)) vehicle.customSegments = [];
      vehicle.customSegments = vehicle.customSegments
        .filter(seg => seg && String(seg.name || "").trim())
        .map(seg => ({
          id: String(seg.id || `seg${Date.now()}${Math.floor(Math.random() * 1000)}`),
          name: String(seg.name).trim()
        }));
      return vehicle;
    }

    function ensureVehicleProjectSchema(vehicle) {
      if (!vehicle) return vehicle;
      if (vehicle.vehicleMode === 'customer') return vehicle;
      if (!vehicle.vehicleMode) vehicle.vehicleMode = 'project';
      ensureVehicleBuildSchema(vehicle);
      hydrateVehicleRecordCollections(vehicle);
      if (String(vehicle.status || "").toLowerCase() === "sold") {
        vehicle.status = "completed";
      }
      vehicle.status = normalizeVehicleStatus(vehicle);
      delete vehicle.salePrice;
      return vehicle;
    }

    function loadVehicles() {
      let vehicles = [];
      if (window.BuildPilotStorage && window.BuildPilotStorage.readVehiclesArrayFromLocalStorage) {
        vehicles = window.BuildPilotStorage.readVehiclesArrayFromLocalStorage();
      } else {
        let data = localStorage.getItem(LS_VEHICLES_KEY);
        if (!data) {
          data = localStorage.getItem(LEGACY_LS_VEHICLES_KEY);
          if (data) localStorage.setItem(LS_VEHICLES_KEY, data);
        }
        if (data) {
          try {
            const parsed = JSON.parse(data);
            if (Array.isArray(parsed)) vehicles = parsed;
          } catch (_parseErr) { /* empty garage */ }
        }
      }
      let changed = false;
      for (let i = 0; i < vehicles.length; i += 1) {
        const v = vehicles[i];
        if (!v || typeof v !== "object") continue;
        const before = JSON.stringify({ bt: v.buildType, cs: v.customSegments, st: v.status });
        ensureVehicleProjectSchema(v);
        if (JSON.stringify({ bt: v.buildType, cs: v.customSegments, st: v.status }) !== before) changed = true;
        if (typeof v.vehiclePurchasePrice !== "number") { v.vehiclePurchasePrice = 0; changed = true; }
        if (typeof v.totalLaborCost !== "number") { v.totalLaborCost = 0; changed = true; }
      }
      if (changed) saveVehicles(vehicles);
      return vehicles;
    }

    function saveVehicles(vehicles) {
      const payload = JSON.stringify(vehicles);
      localStorage.setItem(LS_VEHICLES_KEY, payload);
      localStorage.setItem(LEGACY_LS_VEHICLES_KEY, payload);
    }

    function getVehicleTasks(vehId) {
      const vehicles = loadVehicles();
      const v = vehicles.find(x => String(x.id) === String(vehId));
      if (v && Array.isArray(v.tasks)) return v.tasks;
      return getStorageArray(`vehicle_tasks_${vehId}`);
    }

    /** Sum estHours for tasks marked completed (this vehicle only). */
    function sumCompletedTaskHoursForVehicle(vehId) {
      const tasksArr = getVehicleTasks(vehId);
      let sum = 0;
      if (!Array.isArray(tasksArr)) return sum;
      for (const t of tasksArr) {
        if (t && (t.completed === true || String(t.status || "").toLowerCase() === "completed")) {
          const hrs = parseFloat(t.estHours || 0);
          if (Number.isFinite(hrs)) sum += hrs;
        }
      }
      return sum;
    }

    function formatTaskHoursLabel(hoursSum) {
      if (!Number.isFinite(hoursSum) || hoursSum <= 0) return "0 hrs";
      if (hoursSum === 1) return "1 hr";
      return hoursSum % 1 === 0 ? `${hoursSum} hrs` : `${hoursSum.toFixed(1)} hrs`;
    }

    function getVehicleParts(vehId) {
      const vehicles = loadVehicles();
      const v = vehicles.find(x => String(x.id) === String(vehId));
      if (v && Array.isArray(v.parts)) return v.parts;
      return getStorageArray(`vehicle_parts_${vehId}`);
    }

    function getVehicleLaborEntries(vehId) {
      const vehicles = loadVehicles();
      const v = vehicles.find(x => String(x.id) === String(vehId));
      if (v && Array.isArray(v.labor)) return v.labor;
      return getStorageArray(`vehicle_labor_${vehId}`);
    }

    function getVehicleCollection(vehicle, keyPrefix, embeddedKey) {
      const stored = getStorageArray(`${keyPrefix}_${vehicle.id}`);
      if (stored.length) return stored;
      const embedded = Array.isArray(vehicle[embeddedKey]) ? vehicle[embeddedKey] : [];
      return embedded;
    }

    function migrateLegacyKeysOntoVehicles() {
      const vehicles = loadVehicles();
      let dirty = false;
      const legacyKeysToRemove = [];

      vehicles.forEach(v => {
        if (!v || typeof v !== "object") return;
        let tookParts = false;
        let tookTasks = false;
        let tookLabor = false;

        const beforeBuild = JSON.stringify({ bt: v.buildType, cs: v.customSegments, st: v.status });
        ensureVehicleProjectSchema(v);
        if (JSON.stringify({ bt: v.buildType, cs: v.customSegments, st: v.status }) !== beforeBuild) dirty = true;

        if (!Array.isArray(v.parts)) {
          v.parts = [];
          dirty = true;
        }
        if (!Array.isArray(v.tasks)) {
          v.tasks = [];
          dirty = true;
        }
        if (!Array.isArray(v.labor)) {
          v.labor = [];
          dirty = true;
        }

        const pk = getStorageArray(`vehicle_parts_${v.id}`);
        const tk = getStorageArray(`vehicle_tasks_${v.id}`);
        const lk = getStorageArray(`vehicle_labor_${v.id}`);

        if (v.parts.length === 0 && pk.length) {
          v.parts = pk.slice();
          dirty = true;
          tookParts = true;
        }
        if (v.tasks.length === 0 && tk.length) {
          v.tasks = tk.slice();
          dirty = true;
          tookTasks = true;
        }
        if (v.labor.length === 0 && lk.length) {
          v.labor = lk.slice();
          dirty = true;
          tookLabor = true;
        }

        if (tookParts) legacyKeysToRemove.push(`vehicle_parts_${v.id}`);
        if (tookTasks) legacyKeysToRemove.push(`vehicle_tasks_${v.id}`);
        if (tookLabor) legacyKeysToRemove.push(`vehicle_labor_${v.id}`);
      });

      if (dirty) {
        saveVehicles(vehicles);
      }

      legacyKeysToRemove.forEach(key => {
        try {
          localStorage.removeItem(key);
        } catch (e) {}
      });
    }

    function gatherGarageItemsForVehicle(vehicle) {
      const vehicles = loadVehicles();
      const v = vehicles.find(x => String(x.id) === String(vehicle.id));
      if (!v) return { parts: [], tasks: [], labor: [] };
      let parts = Array.isArray(v.parts) ? v.parts.slice() : [];
      let tasks = Array.isArray(v.tasks) ? v.tasks.slice() : [];
      let labor = Array.isArray(v.labor) ? v.labor.slice() : [];
      if (!parts.length) parts = getStorageArray(`vehicle_parts_${v.id}`).slice();
      if (!tasks.length) tasks = getStorageArray(`vehicle_tasks_${v.id}`).slice();
      if (!labor.length) labor = getStorageArray(`vehicle_labor_${v.id}`).slice();
      return { parts, tasks, labor };
    }

    function calculateVehicleCompletedLaborTotal(vehId) {
      const laborEntries = getVehicleLaborEntries(vehId);
      let sum = 0;
      for (const entry of laborEntries) {
        if (entry && entry.cost != null && (entry.complete === true || entry.completed === true)) {
          sum += parseCost(entry.cost);
        }
      }
      return sum;
    }

    function getVehiclePurchasePrice(vehId) {
      const vehicles = loadVehicles();
      const vehicle = vehicles.find(v => v.id == vehId);
      return vehicle && typeof vehicle.vehiclePurchasePrice === "number" ? vehicle.vehiclePurchasePrice : 0;
    }

    function calculateVehiclePartsValue(vehId) {
      const parts = getVehicleParts(vehId) || [];
      let sum = 0;
      for (const p of parts) {
        if (p && String(p.status || "").toLowerCase() !== "needed") {
          sum += parseCost(p.cost);
        }
      }
      return sum;
    }

    // --- NEW: Utility to calculate Build Progress percentage for a vehicle
    function calculateVehicleBuildProgress(vehId) {
      const tasks = getVehicleTasks(vehId) || [];
      const parts = getVehicleParts(vehId) || [];
      // Tasks: percent complete
      let tasksPercent = 0;
      if (tasks.length > 0) {
        const completedTasks = tasks.filter(t => !!t.completed).length;
        tasksPercent = (completedTasks / tasks.length) * 100;
      }
      // Parts: percent installed
      let partsPercent = 0;
      if (parts.length > 0) {
        const installedParts = parts.filter(p => p.status === "Installed").length;
        partsPercent = (installedParts / parts.length) * 100;
      }
      // Average & rounding
      let overall = 0;
      if (tasks.length === 0 && parts.length === 0) {
        overall = 0;
      } else if (tasks.length === 0) {
        overall = partsPercent;
      } else if (parts.length === 0) {
        overall = tasksPercent;
      } else {
        overall = (tasksPercent + partsPercent) / 2;
      }
      return Math.round(overall);
    }

    // --- Registration Badge logic & other dashboard functions unchanged from before ---
    function regMonthToNumber(month) {
      if (!month) return undefined;
      const num = Number(month);
      if (!isNaN(num) && num >= 1 && num <= 12) return num;
      const lower = String(month).toLowerCase();
      const months = [
        "january","february","march","april","may","june",
        "july","august","september","october","november","december"
      ];
      for(let i=0;i<12;i++){
        if(lower.startsWith(months[i].slice(0,3))) return i+1;
        if(lower===months[i]) return i+1;
      }
      return undefined;
    }

    function getVehicleRegStatus(vehId) {
      const vehicles = loadVehicles();
      const vehicle = vehicles.find(v => v && v.id == vehId);

      let regMonth = vehicle && vehicle.regMonth != null ? vehicle.regMonth : "";
      let regDay = vehicle && vehicle.regDay != null ? vehicle.regDay : "";
      let regNonOp = vehicle && vehicle.regNonOp ? !!vehicle.regNonOp : false;

      let fullRegExpiryKey = `vehicle_reg_expiry_${vehId}`;
      let regExpiryStr = localStorage.getItem(fullRegExpiryKey);
      let regExpiryDate = null;
      if (regExpiryStr) {
        let parsed = Date.parse(regExpiryStr);
        if (!isNaN(parsed)) regExpiryDate = new Date(parsed);
      }

      if (!regExpiryDate && regMonth && regDay) {
        const monthNum = regMonthToNumber(regMonth);
        const dayNum = parseInt(regDay, 10);
        if (monthNum && !isNaN(dayNum)) {
          const now = new Date();
          const currentYear = now.getFullYear();
          let expiryCand = new Date(currentYear, monthNum - 1, dayNum);
          const nowYMD = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          const expYMD = new Date(expiryCand.getFullYear(), expiryCand.getMonth(), expiryCand.getDate());
          if (expYMD < nowYMD) {
            expiryCand = new Date(currentYear + 1, monthNum - 1, dayNum);
          }
          regExpiryDate = expiryCand;
        }
      }

      return {
        regMonth,
        regDay,
        regNonOp,
        regExpiryDate
      };
    }

    function getRegBadgeHTML(status) {
      if (!status) return '';
      const { badgeClass, label } = status;
      return `<span class="reg-badge ${badgeClass}">${label}</span>`;
    }

    function buildRegStatusBadgeForVehicle(vehId) {
      const vehicles = loadVehicles();
      const vehicle = vehicles.find(v => v && String(v.id) === String(vehId));
      const REG_PREFIX = 'REG STATUS: ';

      if (vehicle && vehicle.registrationStatus) {
        const status = String(vehicle.registrationStatus).trim();
        if (status === 'Non-Op') {
          return { badgeClass: 'reg-badge-nonop', label: `${REG_PREFIX}NON-OP` };
        }
        if (status === 'Current') {
          return { badgeClass: 'reg-badge-current', label: `${REG_PREFIX}CURRENT` };
        }
        if (status === 'Due') {
          return { badgeClass: 'reg-badge-due', label: `${REG_PREFIX}DUE` };
        }
        if (status === 'Expired') {
          return { badgeClass: 'reg-badge-expired', label: `${REG_PREFIX}EXPIRED` };
        }
      }

      const { regNonOp, regExpiryDate } = getVehicleRegStatus(vehId);

      if (regNonOp) {
        return { badgeClass: 'reg-badge-nonop', label: `${REG_PREFIX}NON-OP` };
      }

      if (!regExpiryDate) {
        return { badgeClass: 'reg-badge-not-set', label: `${REG_PREFIX}NOT SET` };
      }

      const now = new Date();
      now.setHours(0, 0, 0, 0);
      const expiry = new Date(regExpiryDate);
      expiry.setHours(0, 0, 0, 0);
      const msPerDay = 1000 * 60 * 60 * 24;
      const deltaDays = Math.round((expiry - now) / msPerDay);

      if (!Number.isFinite(deltaDays)) {
        return { badgeClass: 'reg-badge-not-set', label: `${REG_PREFIX}NOT SET` };
      }

      if (deltaDays < 0) {
        return { badgeClass: 'reg-badge-expired', label: `${REG_PREFIX}EXPIRED` };
      }

      if (deltaDays > 30) {
        return { badgeClass: 'reg-badge-current', label: `${REG_PREFIX}CURRENT` };
      }

      const dueInDays = Math.max(0, deltaDays);
      const dayWord = dueInDays === 1 ? "DAY" : "DAYS";
      return { badgeClass: 'reg-badge-due', label: `${REG_PREFIX}DUE IN ${dueInDays} ${dayWord}` };
    }

    // -- Main garage total calculation --
    function renderGarageInvestmentStats() {
      const vehicles = filterProjectVehicles(loadVehicles());
      let purchaseSum = 0, partsSum = 0, laborSum = 0, hoursSum = 0;

      for (const vehicle of vehicles) {
        // 1. Purchase Price
        let vehiclePurchase = getVehiclePurchasePrice(vehicle.id);
        if (isNaN(vehiclePurchase) || vehiclePurchase == null) vehiclePurchase = 0;
        purchaseSum += vehiclePurchase;

        // 2. Parts Costs (status !== 'Needed')
        const partsArr = getVehicleParts(vehicle.id);
        if (Array.isArray(partsArr)) {
          for (const p of partsArr) {
            if (p && String(p.status || "").toLowerCase() !== "needed") {
              let cost = parseCost(p.cost);
              if (!isNaN(cost) && cost != null) partsSum += cost;
            }
          }
        }

        // 3. Labor Costs (completed entries)
        const laborEntries = getVehicleLaborEntries(vehicle.id);
        if (Array.isArray(laborEntries)) {
          for (const entry of laborEntries) {
            if (entry && entry.cost != null && (entry.complete === true || entry.completed === true)) {
              let cost = parseCost(entry.cost);
              if (!isNaN(cost) && cost != null) laborSum += cost;
            }
          }
        }

        // 4. Hours from completed tasks
        const tasksArr = getVehicleTasks(vehicle.id);
        if (Array.isArray(tasksArr)) {
          for (const t of tasksArr) {
            if (t && (t.completed === true || String(t.status || "").toLowerCase() === "completed")) {
              const hrs = parseFloat(t.estHours || 0);
              if (Number.isFinite(hrs)) hoursSum += hrs;
            }
          }
        }
      }

      if (isNaN(purchaseSum)) purchaseSum = 0;
      if (isNaN(partsSum)) partsSum = 0;
      if (isNaN(laborSum)) laborSum = 0;
      if (isNaN(hoursSum)) hoursSum = 0;

      const total = purchaseSum + partsSum + laborSum;
      const ppEl = document.getElementById('garage-purchase-price');
      const totEl = document.getElementById('garage-total-investment');
      const breakdownEl = document.getElementById('garage-investment-breakdown');

      function displayAmount(val) {
        if (isNaN(val) || val == null) return "$0.00";
        return "$" + Number(val).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
      }

      if (ppEl) ppEl.textContent = displayAmount(purchaseSum);
      if (totEl) totEl.textContent = displayAmount(total);

      if (breakdownEl) {
        const hoursLabel = formatTaskHoursLabel(hoursSum);
        breakdownEl.innerHTML =
          `<div class="garage-breakdown-grid">
            <div class="garage-breakdown-head">Breakdown (all projects):</div>
            <span class="garage-breakdown-label">Purchase</span>
            <span class="garage-breakdown-value">${displayAmount(purchaseSum)}</span>
            <span class="garage-breakdown-label">Parts Costs</span>
            <span class="garage-breakdown-value">${displayAmount(partsSum)}</span>
            <span class="garage-breakdown-label">Labor Costs</span>
            <span class="garage-breakdown-value">${displayAmount(laborSum)}</span>
            <span class="garage-breakdown-label">Hours</span>
            <span class="garage-breakdown-value">${hoursLabel}</span>
          </div>`;
      }
    }
    // -- End main garage investment total --

    function tryParseManifestGarageSheet(rows, sheetName) {
      if (!rows || !rows.length) return null;
      if (isSpreadsheetTemplateSheetName(sheetName)) return null;
      const hdrIdx = rows.findIndex(r =>
        String(r[0] || "").trim() === "Chapter" &&
        String(r[1] || "").trim() === "Type" &&
        String(r[2] || "").trim() === "Item Name"
      );
      if (hdrIdx === -1) return null;
      const header = rows[hdrIdx].map(h => String(h || "").trim());
      const col = {};
      header.forEach((name, i) => { col[name] = i; });
      const isNewFormat = Object.prototype.hasOwnProperty.call(col, "Hours") && Object.prototype.hasOwnProperty.call(col, "Cost");
      const isLegacyFormat = Object.prototype.hasOwnProperty.call(col, "Cost/Price");
      if (!isNewFormat && !isLegacyFormat) return null;

      function normalizeExcelDate(value) {
        if (value == null) return "";
        if (value instanceof Date && !isNaN(value.getTime())) return value.toISOString().slice(0, 10);
        const raw = String(value).trim();
        if (!raw) return "";
        if (/^\d+(\.\d+)?$/.test(raw)) {
          const serial = Number(raw);
          const excelEpoch = new Date(Date.UTC(1899, 11, 30));
          const dt = new Date(excelEpoch.getTime() + Math.round(serial) * 86400000);
          if (!isNaN(dt.getTime())) return dt.toISOString().slice(0, 10);
        }
        const parsed = new Date(raw);
        return !isNaN(parsed.getTime()) ? parsed.toISOString().slice(0, 10) : raw;
      }

      function parseLegacyCostCell(raw, type) {
        const s = raw == null ? "" : String(raw).trim();
        if (type === "Part") {
          const v = parseCost(s.replace(/^\$/, ""));
          return { partPrice: Number.isFinite(v) ? v : 0, laborCost: 0, costHours: 0 };
        }
        let laborCost = 0;
        let costHours = 0;
        const dollar = s.match(/\$[\d,]+\.?\d*/);
        if (dollar) laborCost = parseCost(dollar[0]);
        const hrs = s.match(/([\d.]+)\s*hrs?/i);
        if (hrs) costHours = parseCost(hrs[1]);
        if (type === "Outside Labor") {
          if (!dollar && s) laborCost = parseCost(s.replace(/^\$/, ""));
          return { partPrice: 0, laborCost: Number.isFinite(laborCost) ? laborCost : 0, costHours: 0 };
        }
        return { partPrice: 0, laborCost, costHours };
      }

      let project = {};
      for (let ri = 0; ri < hdrIdx; ri += 1) {
        const extracted = extractManifestProjectNameFromTitleLine(rows[ri] ? rows[ri][0] : "");
        if (extracted) {
          project.Project_Name = extracted;
          break;
        }
      }
      for (let ri = 0; ri < hdrIdx; ri += 1) {
        const line = String(rows[ri] ? rows[ri][0] : "");
        const pp = line.match(/Purchase Price:\s*\$?([\d,]+\.?\d*)/i);
        if (pp) project.Purchase_Price = parseCost(pp[1]);
        if (/registration/i.test(line)) {
          project.Reg_NonOp = /non-op/i.test(line);
          const exp = line.match(/Expiry:\s*(.+)$/i);
          if (exp) {
            const chunk = exp[1].trim();
            if (chunk && chunk !== "?" && chunk !== "-" && chunk !== "?" && !/^not set$/i.test(chunk)) {
              project.Reg_Expiry = normalizeExcelDate(chunk);
            }
          }
        }
      }

      const items = [];
      for (let i = hdrIdx + 1; i < rows.length; i += 1) {
        const row = rows[i];
        const rowChapterRaw = String(row[col.Chapter] == null ? "" : row[col.Chapter]).trim();
        const rowTypeRaw = String(row[col.Type] == null ? "" : row[col.Type]).trim();
        const rowName = String(row[col["Item Name"]] == null ? "" : row[col["Item Name"]]).trim();
        const type = normalizeCsvType(rowTypeRaw);
        if (rowChapterRaw.startsWith("#") || rowTypeRaw.startsWith("#")) continue;
        if (shouldSkipSpreadsheetImportRow(rowName, rowChapterRaw, rowTypeRaw)) continue;
        if (!type || !rowName) continue;
        let partPrice = 0;
        let laborCost = 0;
        let costHours = 0;
        let vendor = "";
        if (isNewFormat) {
          const hoursRaw = row[col["Hours"]];
          const costRaw = row[col["Cost"]];
          const hrsVal = parseCost(String(hoursRaw == null ? "" : hoursRaw).trim());
          const costVal = parseCost(String(costRaw == null ? "" : costRaw).replace(/^\$/, "").trim());
          if (type === "Part") { partPrice = Number.isFinite(costVal) ? costVal : 0; }
          else { laborCost = Number.isFinite(costVal) ? costVal : 0; costHours = Number.isFinite(hrsVal) ? hrsVal : 0; }
          if (Object.prototype.hasOwnProperty.call(col, "Shop / Vendor")) {
            vendor = String(row[col["Shop / Vendor"]] == null ? "" : row[col["Shop / Vendor"]]).trim();
          }
        } else {
          const costRaw = row[col["Cost/Price"]];
          ({ partPrice, laborCost, costHours } = parseLegacyCostCell(costRaw, type));
        }
        items.push({
          chapter: normalizeSystemCategory(rowChapterRaw),
          type,
          name: rowName,
          vendor,
          description: Object.prototype.hasOwnProperty.call(col, "Description") ? String(row[col.Description] == null ? "" : row[col.Description]).trim() : "",
          partPrice,
          laborCost,
          costHours,
          status: normalizeCsvStatus(String(row[col["Status"]] == null ? "" : row[col["Status"]]).trim(), type),
          partUrl: String(row[col["URL"]] == null ? "" : row[col["URL"]]).trim(),
          trackingNumber: String(row[col["Tracking"]] == null ? "" : row[col["Tracking"]]).trim()
        });
      }

      if (!project.Project_Name) project.Project_Name = String(sheetName || "").trim();
      if (isSpreadsheetTemplateVehicleName(project.Project_Name)) project.Project_Name = "";
      if (shouldRejectSpreadsheetImportPayload({ project, items }, sheetName)) return null;
      return sanitizeImportPayload({ project, items });
    }

    function parseSheetRows(rows, sheetName) {
      if (isSpreadsheetTemplateSheetName(sheetName)) return null;
      const manifestPayload = tryParseManifestGarageSheet(rows, sheetName);
      if (manifestPayload) return manifestPayload;
      if (!rows.length) return null;
      const header = rows[0].map(h => String(h || "").trim());
      const index = {};
      header.forEach((name, i) => { index[name] = i; });
      const required = templateHeaders();
      if (!required.every(k => Object.prototype.hasOwnProperty.call(index, k))) return null;
      const payload = { project: {}, items: [] };
      const normalizeDate = (value) => {
        if (value == null) return "";
        if (value instanceof Date && !isNaN(value.getTime())) return value.toISOString().slice(0, 10);
        const raw = String(value).trim();
        if (!raw) return "";
        if (/^\d+(\.\d+)?$/.test(raw)) {
          const serial = Number(raw);
          const excelEpoch = new Date(Date.UTC(1899, 11, 30));
          const dt = new Date(excelEpoch.getTime() + Math.round(serial) * 86400000);
          if (!isNaN(dt.getTime())) return dt.toISOString().slice(0, 10);
        }
        const parsed = new Date(raw);
        return !isNaN(parsed.getTime()) ? parsed.toISOString().slice(0, 10) : raw;
      };
      for (let i = 1; i < rows.length; i += 1) {
        const row = rows[i];
        const rowObj = {};
        required.forEach(key => { rowObj[key] = row[index[key]]; });
        const name = String(rowObj.Name == null ? "" : rowObj.Name).trim();
        const type = normalizeCsvType(rowObj.Type);
        const projectName = String(rowObj.Project_Name == null ? "" : rowObj.Project_Name).trim();
        if (shouldSkipSpreadsheetImportRow(name, projectName)) continue;
        if (!payload.project.Project_Name && projectName && !isSpreadsheetTemplateVehicleName(projectName)) {
          payload.project = {
            Project_Name: projectName,
            Purchase_Price: String(rowObj.Purchase_Price ?? "").trim() === "" ? null : parseCost(rowObj.Purchase_Price),
            Reg_Expiry: normalizeDate(rowObj.Reg_Expiry),
            Reg_NonOp: /^(true|1|yes)$/i.test(String(rowObj.Reg_NonOp ?? "").trim())
          };
        }
        if (!type || !name) continue;
        payload.items.push({
          chapter: normalizeSystemCategory(rowObj.Chapter),
          type,
          name,
          description: String(rowObj.Description ?? "").trim(),
          partPrice: parseCost(rowObj.Part_Price),
          laborCost: parseCost(rowObj.Labor_Cost),
          costHours: parseCost(rowObj.Cost_Hours),
          status: normalizeCsvStatus(rowObj.Status, type),
          partUrl: String(rowObj.Part_URL ?? "").trim(),
          trackingNumber: String(rowObj.Tracking_Number ?? "").trim()
        });
      }
      if (!payload.project.Project_Name) payload.project.Project_Name = String(sheetName || "").trim();
      if (isSpreadsheetTemplateVehicleName(payload.project.Project_Name)) payload.project.Project_Name = "";
      if (shouldRejectSpreadsheetImportPayload(payload, sheetName)) return null;
      return sanitizeImportPayload(payload);
    }

    function applyGarageImport(payloads, mode) {
      let vehicles = loadVehicles();
      if (mode === "replace") {
        vehicles.forEach(v => {
          localStorage.removeItem(`vehicle_tasks_${v.id}`);
          localStorage.removeItem(`vehicle_parts_${v.id}`);
          localStorage.removeItem(`vehicle_labor_${v.id}`);
          localStorage.removeItem(`vehicle_reg_expiry_${v.id}`);
          localStorage.removeItem(`vehicle_system_state_${v.id}`);
        });
        vehicles = [];
      }
      const byName = new Map(vehicles.map(v => [String(v.name || "").toLowerCase(), v]));
      let created = 0;
      let itemsAdded = 0;
      payloads.forEach(payload => {
        const safePayload = sanitizeImportPayload(payload);
        if (!safePayload) return;
        const pName = String(safePayload.project.Project_Name || "").trim();
        if (!pName || isSpreadsheetTemplateVehicleName(pName)) return;
        if (shouldRejectSpreadsheetImportPayload(safePayload, pName)) return;
        let vehicle = byName.get(pName.toLowerCase());
        if (!vehicle) {
          vehicle = {
            id: Date.now() + Math.floor(Math.random() * 1000),
            name: pName,
            buildType: "standard",
            customSegments: [],
            status: "active",
            vehiclePurchasePrice: 0,
            totalLaborCost: 0,
            parts: [],
            tasks: [],
            labor: []
          };
          ensureVehicleProjectSchema(vehicle);
          vehicles.push(vehicle);
          byName.set(pName.toLowerCase(), vehicle);
          created += 1;
        } else {
          hydrateVehicleRecordCollections(vehicle);
        }
        const parts = mode === "replace"
          ? []
          : sanitizeImportArray(Array.isArray(vehicle.parts) && vehicle.parts.length
            ? vehicle.parts.slice()
            : getStorageArray(`vehicle_parts_${vehicle.id}`));
        const tasks = mode === "replace"
          ? []
          : sanitizeImportArray(Array.isArray(vehicle.tasks) && vehicle.tasks.length
            ? vehicle.tasks.slice()
            : getStorageArray(`vehicle_tasks_${vehicle.id}`));
        const labor = mode === "replace"
          ? []
          : sanitizeImportArray(Array.isArray(vehicle.labor) && vehicle.labor.length
            ? vehicle.labor.slice()
            : getStorageArray(`vehicle_labor_${vehicle.id}`));
        safePayload.items.forEach(item => {
          itemsAdded += 1;
          if (item.type === "Part") parts.push({ id: `part${Date.now()}${Math.floor(Math.random()*1000)}`, name: item.name, category: item.chapter, status: item.status, cost: sanitizeImportNumber(item.partPrice, 0), partUrl: item.partUrl, trackingNumber: item.trackingNumber });
          else if (item.type === "Task") {
            const taskDone = ["complete", "completed", "installed"].includes(String(item.status || "").toLowerCase());
            const hrs = sanitizeImportNumber(item.costHours, 0);
            tasks.push({ id: `task${Date.now()}${Math.floor(Math.random()*1000)}`, name: item.name, description: item.description, category: item.chapter, estHours: hrs > 0 ? hrs : "", laborCost: sanitizeImportNumber(item.laborCost, 0), status: taskDone ? "Complete" : "Pending", completed: taskDone, trackingNumber: item.trackingNumber });
          } else {
            const laborDone = ["complete", "completed", "installed"].includes(String(item.status || "").toLowerCase());
            labor.push({ id: `labor${Date.now()}${Math.floor(Math.random()*1000)}`, shop: item.name, description: item.description, category: item.chapter, cost: sanitizeImportNumber(item.laborCost, 0), status: laborDone ? "Complete" : "Pending", complete: laborDone, completed: laborDone, trackingNumber: item.trackingNumber });
          }
        });
        if (safePayload.project.Purchase_Price != null && Number.isFinite(safePayload.project.Purchase_Price)) {
          vehicle.vehiclePurchasePrice = safePayload.project.Purchase_Price;
        }
        if (typeof safePayload.project.Reg_NonOp === "boolean") vehicle.regNonOp = safePayload.project.Reg_NonOp;
        if (safePayload.project.Reg_Expiry) {
          const dt = new Date(`${safePayload.project.Reg_Expiry}T00:00:00`);
          if (!isNaN(dt.getTime())) {
            localStorage.setItem(getRegExpiryStorageKey(vehicle.id), dt.toISOString());
            vehicle.regMonth = String(dt.getMonth() + 1);
            vehicle.regDay = String(dt.getDate());
          }
        } else if (mode === "replace") {
          localStorage.removeItem(getRegExpiryStorageKey(vehicle.id));
          vehicle.regMonth = "";
          vehicle.regDay = "";
        }
        vehicle.parts = parts;
        vehicle.tasks = tasks;
        vehicle.labor = labor;
        ensureVehicleProjectSchema(vehicle);
        [`vehicle_parts_${vehicle.id}`, `vehicle_tasks_${vehicle.id}`, `vehicle_labor_${vehicle.id}`].forEach(key => {
          try {
            localStorage.removeItem(key);
          } catch (e) {}
        });
      });
      if (window.BuildPilotStorage && window.BuildPilotStorage.writeVehiclesArrayToLocalStorage) {
        window.BuildPilotStorage.writeVehiclesArrayToLocalStorage(vehicles);
      } else {
        saveVehicles(vehicles);
      }
      migrateLegacyKeysOntoVehicles();
      renderVehicles();
      renderGarageInvestmentStats();
      renderGarageIntelligence();
      notifyGarageDataUpdated({
        source: "template-import",
        mode,
        vehiclesUpdated: vehicles.length,
        itemsAdded
      });
      showResultModal(created, itemsAdded);
    }

    function wireBulkActions() {
      const downloadBtn = document.getElementById("bulk-download-template-btn");
      const uploadBtn = document.getElementById("bulk-upload-data-btn");
      const uploadInput = document.getElementById("bulk-upload-input");
      if (!downloadBtn || !uploadBtn || !uploadInput) return;
      downloadBtn.addEventListener("click", () => {
        downloadMasterTemplateWorkbook().catch(err => alert(err && err.message ? err.message : "Template download failed."));
        closeTemplatesPanel();
      });
      uploadBtn.addEventListener("click", () => {
        uploadInput.value = "";
        uploadInput.click();
        closeTemplatesPanel();
      });
      uploadInput.addEventListener("change", () => {
        const file = uploadInput.files && uploadInput.files[0];
        if (!file) return;
        const lower = String(file.name || "").toLowerCase();
        const isXlsx = lower.endsWith(".xlsx");
        const isCsv = lower.endsWith(".csv");
        if (!isXlsx && !isCsv) return alert("Please upload .xlsx or .csv.");
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            syncAllLiveGarageDataBeforeExport();
            const payloads = [];
            if (isXlsx) {
              if (typeof ExcelJS === "undefined") throw new Error("ExcelJS failed to load.");
              const wb = new ExcelJS.Workbook();
              await wb.xlsx.load(reader.result);
              wb.worksheets.forEach(ws => {
                if (isSpreadsheetTemplateSheetName(ws.name)) return;
                const rows = [];
                for (let r = 1; r <= ws.rowCount; r += 1) {
                  const row = ws.getRow(r);
                  const values = [];
                  let hasValue = false;
                  for (let c = 1; c <= manifestLineItemHeaders().length; c += 1) {
                    const v = extractExcelJsCellValue(row.getCell(c));
                    if (v !== "" && v != null) hasValue = true;
                    values.push(v == null ? "" : v);
                  }
                  if (hasValue) rows.push(values);
                }
                const payload = parseSheetRows(rows, ws.name);
                if (payload && !shouldRejectSpreadsheetImportPayload(payload, ws.name)) payloads.push(payload);
              });
            } else {
              const rows = String(reader.result || "").split(/\r?\n/).map(line => line.split(","));
              const payload = parseSheetRows(rows, "Imported CSV");
              if (payload && !shouldRejectSpreadsheetImportPayload(payload, "Imported CSV")) payloads.push(payload);
            }
            if (!payloads.length) throw new Error("No valid vehicle sheets found.");
            showChoiceModal(payloads);
          } catch (err) {
            alert(err && err.message ? err.message : "Could not parse build sheet.");
          } finally {
            uploadInput.value = "";
          }
        };
        if (isXlsx) reader.readAsArrayBuffer(file); else reader.readAsText(file);
      });
    }

        try {

        overlay.classList.remove("active");
        overlay.innerHTML = "";
        renderVehicles();
        window.location.href = `vehicle-detail.html?id=${encodeURIComponent(vehicleIdStr)}`;
