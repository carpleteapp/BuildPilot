    function measureFluidCollapsePanel(panel) {
      if (!panel) return 800;
      const inner = panel.querySelector('.project-stats-collapse-inner');
      const target = inner || panel;
      return Math.max(Math.ceil(target.scrollHeight), 1);
    }

    function setFluidCollapsePanel(panel, open) {
      if (!panel) return;
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReducedMotion) {
        panel.classList.toggle('is-open', open);
        return;
      }
      if (open) {
        panel.classList.add('is-open');
        panel.style.setProperty('--fluid-collapse-measured', `${measureFluidCollapsePanel(panel)}px`);
        requestAnimationFrame(() => {
          panel.style.setProperty('--fluid-collapse-measured', `${measureFluidCollapsePanel(panel)}px`);
        });
        return;
      }
      panel.style.setProperty('--fluid-collapse-measured', `${panel.scrollHeight}px`);
      requestAnimationFrame(() => {
        panel.classList.remove('is-open');
        panel.style.removeProperty('--fluid-collapse-measured');
      });
    }

    function wireMutualToolbarToggles(configs) {
      configs.forEach(({ toggleId, panelId }) => {
        const btn = document.getElementById(toggleId);
        const panel = document.getElementById(panelId);
        if (!btn || !panel || btn.dataset.toolbarWired === '1') return;
        btn.dataset.toolbarWired = '1';
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          const open = !panel.classList.contains('is-open');
          configs.forEach(({ toggleId: otherToggleId, panelId: otherPanelId }) => {
            if (otherPanelId === panelId) return;
            const otherPanel = document.getElementById(otherPanelId);
            const otherBtn = document.getElementById(otherToggleId);
            setFluidCollapsePanel(otherPanel, false);
            if (otherBtn) otherBtn.setAttribute('aria-expanded', 'false');
          });
          setFluidCollapsePanel(panel, open);
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      });
    }

    function wireProjectStatsToggle() {
      wireMutualToolbarToggles([
        { toggleId: 'templates-toggle', panelId: 'templates-panel' },
        { toggleId: 'project-stats-toggle', panelId: 'project-stats-panel' }
      ]);
    }

    document.addEventListener('DOMContentLoaded', function() {
      if (window.BuildPilotStorage && window.BuildPilotStorage.ensureBetaCleanStorageForTrial) {
        window.BuildPilotStorage.ensureBetaCleanStorageForTrial();
      }
      migrateLegacyKeysOntoVehicles();
      renderVehicles();
      wireProjectStatsToggle();
      wireHeaderActions();
      function wireAddVehicleControls() {
        const openModal = function (e) {
          if (e) {
            e.preventDefault();
            e.stopPropagation();
          }
          openAddVehicleModal();
        };
        const addVehicleBtn = document.getElementById('add-vehicle-btn');
        if (addVehicleBtn && addVehicleBtn.dataset.wired !== '1') {
          addVehicleBtn.dataset.wired = '1';
          addVehicleBtn.addEventListener('click', openModal);
        }
        const addVehicleThumb = document.getElementById('add-vehicle-thumb');
        if (addVehicleThumb && addVehicleThumb.dataset.wired !== '1') {
          addVehicleThumb.dataset.wired = '1';
          addVehicleThumb.addEventListener('click', openModal);
        }
      }
      wireAddVehicleControls();
      wireBulkActions();
      wireVaultActions();
      const headerLogo = document.querySelector(".app-header-logo");
      if (headerLogo && typeof window.BUILDPILOT_LOGO_DATA_URL === "string" && window.BUILDPILOT_LOGO_DATA_URL.startsWith("data:image/")) {
        headerLogo.src = window.BUILDPILOT_LOGO_DATA_URL;
      }
      // Keep dashboard totals/cards synced after bulk imports from detail pages.
      window.addEventListener('focus', renderVehicles);
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) renderVehicles();
      });
      window.addEventListener('pageshow', renderVehicles);
      window.addEventListener('buildpilot:vehicles-updated', renderVehicles);
      window.addEventListener('storage', function (e) {
        if (e.key === LS_VEHICLES_KEY || e.key === LEGACY_LS_VEHICLES_KEY) renderVehicles();
      });
    });
  </script>
</body>
</html>
